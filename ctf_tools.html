// Hide archived long-form notes from the UI/search. They remain in this WEB2
// source as a recoverable backup, while the visible Knowledge cards stay concise.
TOOLS = TOOLS.filter(t => !t.archive);

// Local editor data lives in the browser so every category/tool can be
// edited without rewriting this large static reference file each time.
const EDITOR_STORE_KEY = 'ctf-tools-web2-editor-v2';

function cloneToolValue(value){
  return JSON.parse(JSON.stringify(value));
}

function makeCustomToolId(){
  return 'custom-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
}

function safeToolId(id){
  return String(id || '')
    .replace(/[^a-zA-Z0-9_-]/g,'-')
    .replace(/-+/g,'-')
    .replace(/^-|-$/g,'')
    .slice(0,90) || makeCustomToolId();
}

function baseToolId(tool, index){
  const slug = String(tool.name || 'tool')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,'-')
    .replace(/^-|-$/g,'')
    .slice(0,48) || 'tool';
  return `base-${index}-${slug}`;
}

function editableCats(){
  return CATS.filter(c => c.id !== 'all');
}

function cleanCat(cat, fallback='misc'){
  return editableCats().some(c => c.id === cat) ? cat : fallback;
}

function cleanString(value){
  return String(value || '').trim();
}

function parseTags(value){
  if(Array.isArray(value)) return value.map(cleanString).filter(Boolean);
  return String(value || '').split(/[,\n]+/).map(cleanString).filter(Boolean);
}

function parseLineList(value){
  if(Array.isArray(value)) return value.map(cleanString).filter(Boolean);
  return String(value || '')
    .split(/\r?\n/)
    .map(line => cleanString(line).replace(/^[-*]\s+/,'').replace(/^\d+[.)]\s+/,''))
    .filter(Boolean);
}

function normalizeUsageList(usage){
  if(!Array.isArray(usage)) return [];
  return usage.map(item => ({
    label: cleanString(item && item.label) || 'Commands',
    body: String((item && item.body) || '').trimEnd()
  })).filter(item => item.label || item.body);
}

function parseUsageText(text){
  const raw = String(text || '').trim();
  if(!raw) return [];
  return raw.split(/\r?\n\s*={3,}\s*\r?\n/)
    .map(block => block.trim())
    .filter(Boolean)
    .map(block => {
      const lines = block.split(/\r?\n/);
      const first = cleanString(lines[0]);
      if(first.startsWith('###')){
        return {
          label: cleanString(first.replace(/^#+\s*/,'')) || 'Commands',
          body: lines.slice(1).join('\n').trimEnd()
        };
      }
      return {label:'Commands', body:block};
    });
}

function usageToText(usage){
  return normalizeUsageList(usage)
    .map(item => `### ${item.label}\n${item.body || ''}`.trimEnd())
    .join('\n\n===\n\n');
}

function lineListToText(list){
  return parseLineList(list).join('\n');
}

function normalizeToolForStore(tool, fallback={}){
  const merged = Object.assign({}, fallback, tool || {});
  return {
    id: safeToolId(merged.id || fallback.id || makeCustomToolId()),
    cat: cleanCat(merged.cat || fallback.cat || 'misc', fallback.cat || 'misc'),
    name: cleanString(merged.name || fallback.name) || 'Untitled Tool',
    url: cleanString(merged.url).replace(/"/g,'%22').replace(/'/g,'%27'),
    tags: parseTags(merged.tags),
    desc: cleanString(merged.desc || fallback.desc) || 'Custom note',
    about: String(merged.about || ''),
    blog: String(merged.blog || ''),
    install: String(merged.install || ''),
    usage: normalizeUsageList(merged.usage),
    tips: parseLineList(merged.tips),
    checklist: parseLineList(merged.checklist),
    checklistTitle: cleanString(merged.checklistTitle || fallback.checklistTitle)
  };
}

function defaultEditorStore(){
  return {version:1, edits:{}, deleted:[], custom:[]};
}

function normalizeEditorStore(raw){
  const store = defaultEditorStore();
  if(!raw || typeof raw !== 'object') return store;
  const edits = raw.edits && typeof raw.edits === 'object' ? raw.edits : {};
  Object.keys(edits).forEach(id => {
    const safeId = safeToolId(id);
    store.edits[safeId] = normalizeToolForStore(Object.assign({}, edits[id], {id:safeId}));
  });
  store.deleted = Array.isArray(raw.deleted)
    ? [...new Set(raw.deleted.map(safeToolId))]
    : [];
  store.custom = Array.isArray(raw.custom)
    ? raw.custom.map(tool => normalizeToolForStore(tool)).filter(tool => tool.name)
    : [];
  return store;
}

function readEditorStore(){
  try{
    const raw = localStorage.getItem(EDITOR_STORE_KEY);
    return raw ? normalizeEditorStore(JSON.parse(raw)) : defaultEditorStore();
  }catch(err){
    console.warn('Could not read editor store', err);
    return defaultEditorStore();
  }
}

function saveEditorStore(){
  localStorage.setItem(EDITOR_STORE_KEY, JSON.stringify(TOOL_STORE));
}

function applyEditorStore(){
  const deleted = new Set(TOOL_STORE.deleted || []);
  const baseTools = ORIGINAL_TOOLS
    .filter(tool => !deleted.has(tool.id))
    .map(tool => TOOL_STORE.edits[tool.id]
      ? Object.assign({}, tool, normalizeToolForStore(TOOL_STORE.edits[tool.id], tool), {id:tool.id})
      : cloneToolValue(tool)
    );
  const customTools = (TOOL_STORE.custom || []).map(tool => normalizeToolForStore(tool));
  return baseTools.concat(customTools);
}

function refreshToolView(){
  TOOLS = applyEditorStore();
  buildSidebar();
  buildSections();
  const input = primarySearchInput();
  const q = input ? input.value : '';
  if(q && q.trim()) handleSearch(q, input);
  else showCat(currentCat || 'all');
}

function getToolById(id){
  return TOOLS.find(tool => tool.id === id);
}

function isBaseTool(id){
  return ORIGINAL_TOOLS.some(tool => tool.id === id);
}

function ensureEditorCatOptions(){
  const select = document.getElementById('editor-cat');
  if(!select) return;
  select.innerHTML = editableCats()
    .map(c => `<option value="${esc(c.id)}">${c.icon} ${esc(c.label)}</option>`)
    .join('');
}

function openToolEditor(id=''){
  ensureEditorCatOptions();
  const modal = document.getElementById('editor-modal');
  const tool = id ? getToolById(id) : null;
  const defaultCat = currentCat && currentCat !== 'all' ? currentCat : 'misc';
  document.getElementById('editor-title').textContent = tool ? `แก้ไข: ${tool.name}` : 'เพิ่ม Tool / Blog';
  document.getElementById('editor-id').value = tool ? tool.id : '';
  document.getElementById('editor-name').value = tool ? tool.name : '';
  document.getElementById('editor-cat').value = tool ? tool.cat : cleanCat(defaultCat);
  document.getElementById('editor-url').value = tool ? (tool.url || '') : '';
  document.getElementById('editor-tags').value = tool ? parseTags(tool.tags).join(', ') : '';
  document.getElementById('editor-desc').value = tool ? (tool.desc || '') : '';
  document.getElementById('editor-about').value = tool ? (tool.about || '') : '';
  document.getElementById('editor-blog').value = tool ? (tool.blog || '') : '';
  document.getElementById('editor-install').value = tool ? (tool.install || '') : '';
  document.getElementById('editor-usage').value = tool ? usageToText(tool.usage) : '';
  document.getElementById('editor-tips').value = tool ? lineListToText(tool.tips) : '';
  document.getElementById('editor-checklist').value = tool ? lineListToText(tool.checklist) : '';
  document.getElementById('editor-delete').style.display = tool ? '' : 'none';
  document.getElementById('editor-restore').style.display = tool && isBaseTool(tool.id) && TOOL_STORE.edits[tool.id] ? '' : 'none';
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
  setTimeout(()=>document.getElementById('editor-name').focus(),0);
}

function closeToolEditor(){
  const modal = document.getElementById('editor-modal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
}

function toolFromEditorForm(existingId=''){
  return normalizeToolForStore({
    id: existingId || makeCustomToolId(),
    cat: document.getElementById('editor-cat').value,
    name: document.getElementById('editor-name').value,
    url: document.getElementById('editor-url').value,
    tags: document.getElementById('editor-tags').value,
    desc: document.getElementById('editor-desc').value,
    about: document.getElementById('editor-about').value,
    blog: document.getElementById('editor-blog').value,
    install: document.getElementById('editor-install').value,
    usage: parseUsageText(document.getElementById('editor-usage').value),
    tips: document.getElementById('editor-tips').value,
    checklist: document.getElementById('editor-checklist').value
  });
}

function saveToolEditor(event){
  event.preventDefault();
  const existingId = document.getElementById('editor-id').value;
  const tool = toolFromEditorForm(existingId);
  if(existingId && isBaseTool(existingId)){
    tool.id = existingId;
    TOOL_STORE.edits[existingId] = tool;
    TOOL_STORE.deleted = (TOOL_STORE.deleted || []).filter(id => id !== existingId);
  }else if(existingId){
    const idx = (TOOL_STORE.custom || []).findIndex(item => item.id === existingId);
    tool.id = existingId;
    if(idx >= 0) TOOL_STORE.custom[idx] = tool;
    else TOOL_STORE.custom.push(tool);
  }else{
    TOOL_STORE.custom.push(tool);
  }
  saveEditorStore();
  closeToolEditor();
  refreshToolView();
}

function deleteTool(id){
  const tool = getToolById(id);
  if(!tool) return;
  if(!confirm(`ลบ/ซ่อน "${tool.name}" จากหน้านี้?`)) return;
  if(isBaseTool(id)){
    TOOL_STORE.deleted = [...new Set([...(TOOL_STORE.deleted || []), id])];
    delete TOOL_STORE.edits[id];
  }else{
    TOOL_STORE.custom = (TOOL_STORE.custom || []).filter(item => item.id !== id);
  }
  saveEditorStore();
  closeToolEditor();
  refreshToolView();
}

function deleteToolFromModal(){
  const id = document.getElementById('editor-id').value;
  if(id) deleteTool(id);
}

function restoreOriginalTool(){
  const id = document.getElementById('editor-id').value;
  if(!id || !isBaseTool(id)) return;
  delete TOOL_STORE.edits[id];
  TOOL_STORE.deleted = (TOOL_STORE.deleted || []).filter(item => item !== id);
  saveEditorStore();
  closeToolEditor();
  refreshToolView();
}

function resetEditorData(){
  if(!confirm('ลบ edits/custom tools ทั้งหมดที่เก็บใน browser นี้?')) return;
  localStorage.removeItem(EDITOR_STORE_KEY);
  TOOL_STORE = defaultEditorStore();
  closeToolEditor();
  refreshToolView();
}

function exportEditorData(){
  const payload = {
    version:1,
    exportedAt:new Date().toISOString(),
    store:TOOL_STORE
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ctf-tools-web2-edits.json';
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  document.body.removeChild(a);
}

function importEditorData(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      TOOL_STORE = normalizeEditorStore(parsed.store || parsed);
      saveEditorStore();
      refreshToolView();
      alert('นำเข้า edits เรียบร้อย');
    }catch(err){
      alert('ไฟล์ JSON ไม่ถูกต้อง');
    }finally{
      input.value = '';
    }
  };
  reader.readAsText(file);
}

function toolSearchText(tool){
  const usage = (tool.usage || []).map(u => `${u.label || ''}\n${u.body || ''}`).join('\n');
  return [
    tool.name, tool.desc, tool.about, tool.blog, tool.install, tool.url,
    (tool.tags || []).join(' '),
    (tool.tips || []).join('\n'),
    (tool.checklist || []).join('\n'),
    usage
  ].join('\n').toLowerCase();
}

const ORIGINAL_TOOLS = TOOLS.map((tool, index) => Object.assign(
  cloneToolValue(tool),
  {id:safeToolId(tool.id || baseToolId(tool, index))}
));
let TOOL_STORE = readEditorStore();
TOOLS = applyEditorStore();

function esc(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function escAttr(s){
  return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function tagHtml(t){
  const cls={online:'tag-online',cli:'tag-cli',python:'tag-python',java:'tag-java',ruby:'tag-ruby'};
  return `<span class="tag ${cls[t]||''}">${esc(t)}</span>`;
}

function catColor(id){
  return (CATS.find(c=>c.id===id)||{c:'#5b8dee'}).c;
}

function renderCard(tool, q=''){
  const c = catColor(tool.cat);
  const hiE = s => {
    // escape HTML entities first, then apply search highlight
    const escaped = esc(s);
    return q
      ? escaped.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`)
      : escaped;
  };
  // alias for non-escaped version (code blocks already use esc())
  const hi = hiE;
  const uid = 'card_' + Math.random().toString(36).slice(2);
  const toolId = escAttr(tool.id || '');
  const toolUrl = escAttr(tool.url || '');

  // build tabs
  const tabs=[], contents=[];
  if(tool.about){
    tabs.push({id:'about',label:'ภาพรวม'});
    contents.push(`<div class="tab-content active" id="${uid}_about">
      <div class="doc-section"><div class="doc-p">${hi(tool.about)}</div></div>
      ${tool.tips&&tool.tips.length?`<div class="doc-section">
        <h4>💡 Tips</h4>
        <ul class="checklist">${tool.tips.map(t=>`<li>${hi(t)}</li>`).join('')}</ul>
      </div>`:''}
      ${tool.checklist&&tool.checklist.length?`<div class="doc-section">
        <h4>${hi(tool.checklistTitle||'📋 Wargames / Levels')}</h4>
        <ul class="checklist">${tool.checklist.map(t=>`<li>${hi(t)}</li>`).join('')}</ul>
      </div>`:''}
    </div>`);
  }
  if(tool.blog){
    tabs.push({id:'blog',label:'Blog'});
    contents.push(`<div class="tab-content" id="${uid}_blog">
      <div class="doc-section">
        <h4>Blog / Notes</h4>
        <div class="doc-p">${hi(tool.blog)}</div>
      </div>
    </div>`);
  }
  if(tool.install){
    tabs.push({id:'install',label:'ติดตั้ง'});
    contents.push(`<div class="tab-content" id="${uid}_install">
      <div class="codeblock">
        <div class="code-label">Installation</div>
        <pre>${esc(tool.install)}</pre>
      </div>
    </div>`);
  }
  if(tool.usage&&tool.usage.length){
    tabs.push({id:'usage',label:'วิธีใช้'});
    contents.push(`<div class="tab-content" id="${uid}_usage">
      ${tool.usage.map(u=>`<div class="codeblock">
        <div class="code-label">${esc(u.label)}</div>
        <button class="copy-btn" onclick="copyCode(this)">copy</button>
        <pre>${esc(u.body)}</pre>
      </div>`).join('')}
    </div>`);
  }

  const hasExpand = tabs.length > 0;
  const firstTab = hasExpand ? tabs[0].id : '';

  return `<div class="card" style="--c:${c}" id="${uid}">
    <div class="card-header" role="button" tabindex="0" aria-expanded="false" aria-controls="${uid}_body" onclick="toggleCard('${uid}','${firstTab}')" onkeydown="cardKey(event,'${uid}','${firstTab}')">
      <div class="card-top">
        <div class="card-name"><span class="dot"></span>${hi(tool.name)}</div>
        <div class="editor-card-actions">
          <button type="button" class="editor-mini-btn" onclick="event.stopPropagation();openToolEditor('${toolId}')">แก้ไข</button>
          <button type="button" class="editor-mini-btn danger" onclick="event.stopPropagation();deleteTool('${toolId}')">ลบ</button>
          ${tool.url?`<a class="card-link" href="${tool.url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">↗ เปิด</a>`:''}
          ${hasExpand?`<span class="card-expand" id="${uid}_btn">▾ ดูเพิ่ม</span>`:''}
        </div>
      </div>
      <div class="card-desc">${hi(tool.desc)}</div>
      ${tool.tags&&tool.tags.length?`<div class="card-tags">${tool.tags.map(tagHtml).join('')}</div>`:''}
    </div>
    ${hasExpand?`<div class="card-body" id="${uid}_body">
      <div class="tabs" id="${uid}_tabs">
        ${tabs.map((t,i)=>`<button type="button" class="tab${i===0?' active':''}" onclick="switchTab('${uid}','${t.id}')">${t.label}</button>`).join('')}
      </div>
      ${contents.join('')}
    </div>`:''}
  </div>`;
}

function toggleCard(uid, firstTab){
  const body = document.getElementById(uid+'_body');
  const btn  = document.getElementById(uid+'_btn');
  const head = document.querySelector(`#${uid} .card-header`);
  if(!body) return;
  const isOpen = body.classList.toggle('open');
  if(btn) btn.textContent = isOpen ? '▴ ซ่อน' : '▾ ดูเพิ่ม';
  if(head) head.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  if(isOpen && firstTab) switchTab(uid, firstTab);
}

function cardKey(e, uid, firstTab){
  if(e.target.closest('a,button,input,select,textarea')) return;
  if(e.key==='Enter'||e.key===' '){
    e.preventDefault();
    toggleCard(uid, firstTab);
  }
}

function switchTab(uid, tabId){
  document.querySelectorAll(`#${uid}_tabs .tab`).forEach(t=>{
    t.classList.toggle('active', t.textContent.trim() === tabIdToLabel(tabId));
  });
  // hide all, show target
  ['about','blog','install','usage'].forEach(id=>{
    const el = document.getElementById(`${uid}_${id}`);
    if(el) el.classList.toggle('active', id===tabId);
  });
}

function tabIdToLabel(id){
  if(id === 'blog') return 'Blog';
  return {about:'ภาพรวม',install:'ติดตั้ง',usage:'วิธีใช้'}[id]||id;
}

function copyCode(btn){
  const pre = btn.nextElementSibling;
  const text = pre.textContent;
  const done = ok => {
    btn.textContent = ok ? '✓' : '!' ;
    setTimeout(()=>btn.textContent='copy',1200);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>done(true)).catch(()=>fallbackCopy(text, done));
  }else{
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.setAttribute('readonly','');
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  let ok=false;
  try{ ok=document.execCommand('copy'); }catch(e){ ok=false; }
  document.body.removeChild(ta);
  done(ok);
}

function showCat(id){
  currentCat=id;
  document.getElementById('search-results').style.display='none';
  document.getElementById('empty').style.display='none';
  document.getElementById('sections-wrap').style.display='';
  document.querySelectorAll('.sb-item').forEach(b=>{

  });
  const mobileCat=document.getElementById('mobile-cat');
  if(mobileCat && mobileCat.value!==id) mobileCat.value=id;
  const cat=CATS.find(c=>c.id===id);
  document.getElementById('pt').textContent = cat?cat.label:'ทั้งหมด';
  const cnt = id==='all'?TOOLS.length:TOOLS.filter(t=>t.cat===id).length;
  document.getElementById('pt-count').textContent = `${cnt} tools`;
  document.querySelectorAll('.sec').forEach(s=>{
    s.style.display = (id==='all'||s.id==='sec-'+id) ? '' : 'none';
  });
  document.getElementById('main').scrollTo({top:0,behavior:'smooth'});
}

// ── Search ─────────────────────────────────────────────────
function syncSearchInputs(value, source){
  document.querySelectorAll('.search-input').forEach(input=>{
    if(input!==source) input.value=value;
  });
}

function handleSearch(value, source=null){
  syncSearchInputs(value, source);
  const q = value.trim().toLowerCase();
  const sw = document.getElementById('sections-wrap');
  const sr = document.getElementById('search-results');
  const em = document.getElementById('empty');
  const count = document.getElementById('pt-count');

  if(!q){
    sr.innerHTML='';
    sr.style.display='none';
    em.style.display='none';
    sw.style.display='';
    showCat(currentCat);
    return;
  }

  sw.style.display='none';
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('pt').textContent=`ค้นหา "${value}"`;

  const hits = TOOLS.filter(t => toolSearchText(t).includes(q));

  if(!hits.length){
    sr.innerHTML='';
    sr.style.display='none';
    em.style.display='block';
    count.textContent='0 results';
    return;
  }

  em.style.display='none';
  sr.style.display='block';
  count.textContent=`${hits.length} results`;
  const catLabels = Object.fromEntries(CATS.map(c=>[c.id,c]));
  sr.innerHTML=`<div class="tool-grid">${hits.map(t=>{
    const catInfo = catLabels[t.cat]||{icon:'',label:t.cat,c:'#5b8dee'};
    const card = renderCard(t, q);
    return card.replace(
      '<div class="card-desc">',
      `<span class="sr-cat-badge">${catInfo.icon} ${catInfo.label}</span>
       <div class="card-desc">`
    );
  }).join('')}</div>`;
}

function bindControls(){
  document.querySelectorAll('.search-input').forEach(input=>{
    input.addEventListener('input',function(){ handleSearch(this.value, this); });
  });
  const mobileCat=document.getElementById('mobile-cat');
  if(mobileCat){
    mobileCat.addEventListener('change',function(){
      syncSearchInputs('', null);
      showCat(this.value);
    });
  }
}

function primarySearchInput(){
  const sidebar=document.getElementById('sidebar');
  return getComputedStyle(sidebar).display==='none'
    ? document.getElementById('mobile-search')
    : document.getElementById('sb-search');
}

// ── Keyboard shortcuts ──────────────────────────────────────
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){
    e.preventDefault();
    primarySearchInput().focus();
  }
  if(e.key==='Escape'){
    const modal = document.getElementById('editor-modal');
    if(modal && modal.classList.contains('open')){
      closeToolEditor();
      return;
    }
    const sb=primarySearchInput();
    handleSearch('', sb);
    sb.blur();
  }
});

// ── Back to top ────────────────────────────────────────────
document.getElementById('main').addEventListener('scroll',function(){
  document.getElementById('btt').classList.toggle('show',this.scrollTop>400);
});

// ── Init ────────────────────────────────────────────────────
buildSidebar();
buildSections();
bindControls();
showCat('all');
</script>
</body>
</html>
